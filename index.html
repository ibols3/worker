<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Crew Manager</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif}
body{background:#000033;color:#fff}
.app-wrap{display:flex;height:100%;overflow:hidden}
.sidebar-left{width:240px;min-width:240px;background:#000044;border-right:1px solid #1a1a5e;display:flex;flex-direction:column;height:100%;overflow:hidden}
.sidebar-right{width:220px;min-width:220px;background:#000044;border-left:1px solid #1a1a5e;display:flex;flex-direction:column;height:100%;overflow:hidden}
.center-area{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:20px;min-width:0}

/* ===== A4 CANVAS (White Paper) ===== */
#a4-canvas {
    width: 794px !important;
    height: 1123px !important;
    background-color: #ffffff !important;
    color: #000 !important;
    margin: 40px auto !important;
    padding: 20px !important;
    position: relative !important;
    overflow: hidden !important;
    box-sizing: border-box !important;
    display: flex !important;
    flex-direction: column !important;
    flex-shrink: 0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* ===== INNER CONTENT (Scalable) ===== */
#inner-content {
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    zoom: 1;
    transform-origin: top center;
    transition: zoom 0.2s ease-out;
}

/* ===== HEADER ===== */
.a4-header {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    margin-bottom: 12px;
    flex-shrink: 0;
}

.a4-header img {
    height: 80px;
    object-fit: contain;
}

.a4-header-title {
    flex: 1;
    text-align: center;
    padding-top: 8px;
}

.a4-header-title-main {
    font-size: 40px;
    font-weight: 800;
    line-height: 1.1;
    color: #000;
}

.a4-header-day {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
}

.a4-header-day span,
.a4-header-day select {
    font-size: 40px;
    font-weight: 800;
    color: #000;
}

.a4-header-day select {
    border: none;
    background: transparent;
    appearance: none;
    width: 70px;
    cursor: pointer;
    text-align: center;
    padding: 0;
    margin: 0;
}

.a4-header-date {
    padding-top: 8px;
    text-align: right;
    position: relative;
    display: inline-block;
}

.a4-header-date-label {
    color: #ef4444;
    font-size: 24px;
    font-weight: bold;
    display: block;
    height: 28px;
    line-height: 28px;
    pointer-events: none;
}

.a4-header-date-input {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: transparent;
    border: none;
    color: transparent;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    padding: 0 8px;
    outline: none;
    opacity: 0.001;
    width: 100%;
    height: 100%;
}

/* ===== ZONES CONTAINER ===== */
.zones-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-start;
    flex-shrink: 0;
    margin-bottom: 12px;
}

.zone-box {
    width: calc(33.333% - 4px);
    border: 2px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    break-inside: avoid;
}

.zone-label {
    background: #6b7280;
    color: #fff;
    padding: 3px 8px;
    font-weight: 700;
    font-size: 24px;
    cursor: text;
    display: block;
    flex-shrink: 0;
}

.zone-inner {
    padding: 4px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
}

.zone-title {
    color: #2563eb;
    font-weight: 700;
    font-size: 13px;
    cursor: text;
    outline: none;
    min-height: 16px;
    flex-shrink: 0;
}

.zone-subtitle {
    color: #ef4444;
    font-weight: 700;
    font-style: italic;
    font-size: 11px;
    cursor: text;
    outline: none;
    min-height: 14px;
    flex-shrink: 0;
}

.zone-names {
    min-height: 30px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 0 4px;
    flex: 1;
}

/* ===== CANVAS NAMES (Worker Items) ===== */
.canvas-name {
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    cursor: grab;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: transform 300ms cubic-bezier(0.34,1.56,0.64,1), opacity 200ms ease, background-color 200ms ease, color 200ms ease;
    margin: 2px 0;
    width: 100%;
    text-transform: uppercase !important;
    flex-shrink: 0;
}

.canvas-name:active {
    cursor: grabbing;
}

.canvas-name .num {
    min-width: 14px;
    text-align: right;
    opacity: .8;
    font-size: 9px;
}

.canvas-name .nm {
    flex: 1;
    text-transform: uppercase !important;
}

.canvas-name .del {
    opacity: 0;
    cursor: pointer;
    font-size: 10px;
    padding: 0 2px;
}

.canvas-name:hover .del {
    opacity: .7;
}

/* ===== PLACEHOLDER ===== */
.canvas-placeholder {
    height: 28px;
    background: #3b82f6;
    border: 2px dashed #60a5fa;
    border-radius: 4px;
    margin: 4px 0;
    opacity: 0.4;
    transition: opacity 200ms ease;
    pointer-events: none;
    flex-shrink: 0;
}

/* ===== SUBHEADING ===== */
.canvas-subheading {
    padding: 6px 10px;
    margin: 2px 0;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    color: #000;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
    background: #9ca3af;
    width: 100%;
    cursor: grab;
    border: none;
    transition: transform 200ms cubic-bezier(0.25,0.46,0.45,0.94), opacity 200ms ease;
    text-transform: uppercase !important;
    flex-shrink: 0;
}

.canvas-subheading:active {
    cursor: grabbing;
}

.canvas-subheading .num {
    display: none;
}

.canvas-subheading .nm {
    flex: 1;
    font-style: italic;
    text-transform: uppercase !important;
}

.canvas-subheading .del {
    opacity: 0;
    cursor: pointer;
    font-size: 10px;
    padding: 0 2px;
}

.canvas-subheading:hover .del {
    opacity: .7;
}

/* ===== STANDBY ===== */
.standby-box {
    border: 2px solid #999;
    border-radius: 6px;
    min-height: 60px;
    margin-top: 12px;
    margin-bottom: 12px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    width: calc(33.333% - 4px);
}

.standby-header {
    background: #6b7280;
    color: #fff;
    padding: 3px 8px;
    font-weight: 700;
    font-size: 11px;
    flex-shrink: 0;
}

.standby-names {
    min-height: 30px;
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex: 1;
}

.standby-names .canvas-name {
    background: #E5E7EB !important;
    color: #000 !important;
    font-weight: 700;
    border: 1px solid #d1d5db;
    padding: 4px 8px;
}

.standby-names .canvas-name:hover .del {
    opacity: .5;
}

.standby-names .canvas-subheading {
    background: #9ca3af;
    color: #000;
    border: 1px solid #9ca3af;
}

/* ===== COUNTER ===== */
.a4-counter {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid #ddd;
    text-align: left;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    color: #000;
}

/* ===== POOL ITEMS ===== */
.pool-item {
    padding: 5px 10px;
    margin: 2px 6px;
    border-radius: 4px;
    cursor: grab;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform 150ms ease, opacity 150ms ease;
    text-transform: uppercase !important;
}

.pool-item:active {
    cursor: grabbing;
    opacity: .8;
}

.pool-item .grip {
    opacity: .4;
    font-size: 10px;
}

.pool-item .nm {
    text-transform: uppercase !important;
}

.pool-subheading {
    padding: 5px 10px;
    margin: 2px 6px;
    border-radius: 4px;
    cursor: grab;
    font-size: 12px;
    font-weight: 600;
    color: #999;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid #666;
    font-style: italic;
    transition: transform 150ms ease, opacity 150ms ease;
    text-transform: uppercase !important;
}

.pool-subheading:active {
    cursor: grabbing;
    opacity: .8;
}

.pool-subheading .grip {
    opacity: .4;
    font-size: 10px;
}

.pool-subheading .nm {
    flex: 1;
    outline: none;
    text-transform: uppercase !important;
}

/* ===== UTILITIES ===== */
.drop-hover {
    background: #e0e7ff !important;
}

.color-popup {
    position: fixed;
    z-index: 9999;
    background: #1e1e2e;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 8px;
    display: flex;
    gap: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
}

.color-popup .swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform .15s;
}

.color-popup .swatch:hover {
    transform: scale(1.2);
    border-color: #fff;
}

.marquee {
    position: fixed;
    border: 2px dashed #3b82f6;
    background: rgba(59,130,246,0.15);
    z-index: 9998;
    pointer-events: none;
}

.selected-name {
    background: #fbbf24 !important;
    border: 2px solid #fff;
    box-shadow: 0 0 8px rgba(251,191,36,0.8);
    outline: none !important;
}

.btn-sm {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
    transition: background .2s;
}

.scroll-y {
    overflow-y: auto;
    flex: 1;
    min-height: 0;
}

.sidebar-title {
    padding: 10px 12px;
    font-weight: 700;
    font-size: 14px;
    border-bottom: 1px solid #1a1a5e;
    flex-shrink: 0;
}

input:focus,
select:focus {
    outline: none;
}

[contenteditable]:focus {
    outline: 1px dashed #999;
}

@media print {
    .sidebar-left, .sidebar-right {
        display: none;
    }
    .center-area {
        padding: 0;
    }
}
</style>

 <body class="h-full">
  <div class="app-wrap" id="app">
   <!-- LEFT SIDEBAR -->
   <div class="sidebar-left">
    <div class="sidebar-title flex items-center gap-2"><i data-lucide="users" style="width:16px;height:16px"></i> Pool List
    </div>
    <div class="scroll-y" id="poolList"></div>
    <div style="padding:8px;border-top:1px solid #1a1a5e;flex-shrink:0">
     <form id="addForm" class="flex gap-1">
      <select id="addType" class="bg-transparent border border-gray-600 rounded px-2 py-1 text-xs text-white" style="cursor:pointer"> <option value="worker">Worker</option> <option value="subheading">Sub-Head</option> </select> <input id="addInput" type="text" placeholder="Add name..." class="flex-1 bg-transparent border border-gray-600 rounded px-2 py-1 text-xs text-white" style="min-width:0"> <button type="submit" class="btn-sm bg-emerald-600 text-white hover:bg-emerald-500"><i data-lucide="plus" style="width:14px;height:14px"></i></button>
     </form>
    </div>
   </div><!-- CENTER -->
   <div class="center-area" id="centerScroll">
    <div id="a4-canvas">
     <div id="inner-content"><!-- HEADER -->
      <div class="a4-header">
       <div style="height:80px;flex-shrink:0"><img src="https://lh3.googleusercontent.com/d/1V5663PPMmcLtr55UBPIcvIr-p7CW6VaN" style="height:80px;object-fit:contain" alt="Logo" loading="lazy" onerror="this.style.background='#e5e7eb';this.alt='Logo unavailable';this.style.width='80px'">
       </div>
       <div class="a4-header-title">
        <div class="a4-header-title-main">
         <div id="canvasMainTitle">
          I.B.O.L
         </div>
         <div class="a4-header-day"><span id="canvasDayLabel">DAY</span> <select id="daySelect" class="a4-header-day"></select>
         </div>
        </div>
       </div>
       <div class="a4-header-date"><span class="a4-header-date-label" id="header-date-label">RABU, 31 MARET 26</span> <input type="date" id="header-date-input" class="a4-header-date-input" title="Click to change date">
       </div>
      </div><!-- ZONES CONTAINER -->
      <div class="zones-container" id="zonesGrid"></div><!-- STANDBY -->
      <div class="standby-box" id="standbyBox">
       <div class="standby-header">
        STANDBY
       </div>
       <div class="standby-names" id="standbyNames"></div>
      </div><!-- COUNTER -->
      <div class="a4-counter">
       <div style="margin-bottom:4px"><span style="color:#CC0000">TOTAL PEKERJA BEKERJA: <span id="countWork" style="color:#CC0000">0</span></span>
       </div>
       <div><span style="color:#7c3aed">TOTAL PEKERJA STANDBY: <span id="countStandby" style="color:#7c3aed">0</span></span>
       </div>
      </div>
     </div>
    </div>
   </div><!-- RIGHT SIDEBAR -->
   <div class="sidebar-right">
    <div class="sidebar-title flex items-center gap-2"><i data-lucide="layout" style="width:16px;height:16px"></i> Zone &amp; Export
    </div>
    <div class="scroll-y" style="padding:10px;display:flex;flex-direction:column;gap:8px">
     <button id="btnAddZone" class="btn-sm bg-blue-600 text-white hover:bg-blue-500 w-full"><i data-lucide="plus-square" style="width:14px;height:14px"></i> Add Zone</button> <button id="btnExport" class="btn-sm bg-amber-600 text-white hover:bg-amber-500 w-full"><i data-lucide="download" style="width:14px;height:14px"></i> Download JPEG</button>
     <div class="text-xs text-gray-400 mt-4">
      <p class="mb-2">• Drag names from pool to zones</p>
      <p class="mb-2">• Double-click name on canvas to change color</p>
      <p class="mb-2">• Click &amp; drag on canvas for marquee select</p>
      <p class="mb-2">• Max 3 zones per row</p>
     </div>
    </div>
   </div>
  </div><!-- COLOR POPUP -->
  <div id="colorPopup" class="color-popup" style="display:none"></div><!-- MARQUEE -->
  <div id="marquee" class="marquee" style="display:none"></div>
  <script>
// ---- DATA ----
const COLORS = {
  blue:'#2563eb', yellow:'#FFD700', orange:'#FF8C00', red:'#CC0000',
  green:'#16a34a', pink:'#db2777', gray:'#6b7280', purple:'#a855f7'
};
const COLOR_LIST = ['red','blue','yellow','green','pink','orange'];
const COLOR_HEX = COLOR_LIST.map(c=>COLORS[c]);

// Calculate text color based on background contrast (WCAG)
function getContrastTextColor(bgHex) {
  const rgb = parseInt(bgHex.slice(1), 16);
  const r = (rgb >> 16) & 255;
  const g = (rgb >> 8) & 255;
  const b = rgb & 255;
  const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  
  // For dark backgrounds (luminance < 0.5), use white text
  // For light backgrounds (luminance >= 0.5), use black text
  return luminance < 0.5 ? '#ffffff' : '#000000';
}

const INITIAL_POOL = [
  {cat:'blue',names:['Fredy Chidotz','Deni Sandy','Hamdan','Iman Udeng','Pingki Sopian']},
  {cat:'yellow',names:['Adi Susanto','Alif','Ikhwani','Yudi','Fahmi','Aditya Arisandi','Kikin','Samsul Hidayat']},
  {cat:'orange',names:['Supriyadi','Hendri','Basori','Acep','Edi','Sudarmansyah','Ryan Hermawan','Iwan A. setiawan']},
  {cat:'red',names:['Heri Suherman','Ismail','Rahmat','Rendi','Dafa','Anggi Yanuar','Caryana','Pryambudi','Asep A. Setiawan','Sandi permana','Aditiya A. Aziz','Wawan Kurniawan','Rizki N. Huda','M. Dian Saputra']}
];

let poolNames = [];
let nextId = 1;
let zoneCount = 0;
let dragData = null;
let colorTarget = null;
let marqueeActive = false;
let marqueeStart = null;
let selectedIds = new Set();

function uid(){return 'd'+(nextId++)}

// Init pool
INITIAL_POOL.forEach(g=>{
  g.names.forEach(n=>{
    poolNames.push({id:uid(), name:n, type:'worker', color:COLORS[g.cat]});
  });
});

// Day selector
const daySelect = document.getElementById('daySelect');
for(let i=1;i<=40;i++){const o=document.createElement('option');o.value=i;o.textContent=i;daySelect.appendChild(o);}

// Date input - set to today and make showPicker work
const dateInp = document.getElementById('header-date-input');
const dateLabel = document.getElementById('header-date-label');

// Format tanggal ke Bahasa Indonesia
function formatDateIndonesian(dateString) {
  const date = new Date(dateString + 'T00:00:00');
  const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
  const months = ['JANUARI', 'FEBRUARI', 'MARET', 'APRIL', 'MEI', 'JUNI', 'JULI', 'AGUSTUS', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DESEMBER'];
  
  const dayName = days[date.getDay()];
  const dayNum = date.getDate();
  const monthName = months[date.getMonth()];
  const yearLast2 = String(date.getFullYear()).slice(-2);
  
  return `${dayName}, ${dayNum} ${monthName} ${yearLast2}`;
}

// Set tanggal hari ini
const today = new Date().toISOString().split('T')[0];
dateInp.value = today;
dateLabel.textContent = formatDateIndonesian(today);

// Update label saat tanggal berubah
dateInp.addEventListener('change', function() {
  dateLabel.textContent = formatDateIndonesian(this.value);
});

// Trigger date picker on click
dateInp.addEventListener('click', function() {
  if(this.showPicker) this.showPicker();
});

// ---- POOL RENDER ----
function renderPool(){
  const el = document.getElementById('poolList');
  const existing = new Map([...el.children].map(c=>[c.dataset.id,c]));
  const ids = new Set(poolNames.map(p=>p.id));
  existing.forEach((node,id)=>{if(!ids.has(id))node.remove();});
  poolNames.forEach(p=>{
    let node = existing.get(p.id);
    if(!node){
      node = document.createElement('div');
      node.className = p.type === 'subheading' ? 'pool-subheading' : 'pool-item';
      node.dataset.id=p.id;
      node.dataset.type=p.type;
      node.draggable=true;
      if(p.type === 'subheading'){
        node.innerHTML='<span class="grip">⠿</span><span class="nm" contenteditable="true" style="user-select:all"></span>';
        node.querySelector('.nm').addEventListener('click',e=>e.stopPropagation());
        node.querySelector('.nm').addEventListener('blur',()=>{
          const newText = node.querySelector('.nm').textContent.trim().toUpperCase();
          if(newText) p.name = newText;
          else renderPool(); // Re-render if emptied
        });
      } else {
        node.innerHTML='<span class="grip">⠿</span><span class="nm"></span>';
      }
      node.addEventListener('dragstart',onPoolDragStart);
      node.addEventListener('touchstart',onTouchStart,{passive:false});
      el.appendChild(node);
    }
    node.style.background=p.type === 'subheading' ? 'transparent' : p.color;
    node.style.color=p.type === 'subheading' ? '' : getContrastTextColor(p.color);
    node.style.fontWeight=p.type === 'subheading' ? '' : '700';
    node.querySelector('.nm').textContent=p.name.toUpperCase();
  });
}

// ---- ZONE MANAGEMENT ----
function addZone(){
  zoneCount++;
  const zid='zone_'+zoneCount;
  const grid=document.getElementById('zonesGrid');
  const box=document.createElement('div');
  box.className='zone-box';
  box.dataset.zone=zid;
  box.innerHTML=`
    <div class="zone-label" contenteditable="true">ZONE ${zoneCount}</div>
    <div class="zone-inner">
      <div class="zone-title" contenteditable="true" data-placeholder="Title">Title</div>
      <div class="zone-subtitle" contenteditable="true" data-placeholder="Sub-title">Sub-title</div>
      <div class="zone-names" data-zone="${zid}"></div>
    </div>`;
  grid.appendChild(box);
  setupDropZone(box.querySelector('.zone-names'));
}

function setupDropZone(el){
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drop-hover');});
  el.addEventListener('dragleave',()=>el.classList.remove('drop-hover'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('drop-hover');
    handleDrop(el,e);
  });
}

// Setup standby drop
setupDropZone(document.getElementById('standbyNames'));

// ---- DRAG & DROP ----
function onPoolDragStart(e){
  const id=e.currentTarget.dataset.id;
  
  // If this item is selected and part of a multi-selection, drag all selected
  if(selectedIds.size>0 && selectedIds.has(id)){
    dragData={type:'multi',ids:[...selectedIds],source:'pool'};
    
    // Create professional ghost image showing all selected pool items
    const dragImg = document.createElement('div');
    dragImg.style.position='fixed';
    dragImg.style.zIndex='10000';
    dragImg.style.pointerEvents='none';

function onCanvasDragStart(e){
  const id=e.currentTarget.dataset.id;
  const src=e.currentTarget.closest('.zone-names,.standby-names');
  
  if(selectedIds.size>0 && selectedIds.has(id)){
    // Multi-select drag: move all selected names together
    dragData={type:'multi',ids:[...selectedIds],source:'canvas',srcEl:src};
    
    // Create professional ghost image showing all selected items
    const dragImg = document.createElement('div');
    dragImg.style.position='fixed';
    dragImg.style.zIndex='10000';
    dragImg.style.pointerEvents='none';
    dragImg.style.opacity='0.9';
    dragImg.style.background='#1e1e2e';
    dragImg.style.border='2px solid #3b82f6';
    dragImg.style.borderRadius='6px';
    dragImg.style.padding='8px';
    dragImg.style.minWidth='120px';
    dragImg.style.boxShadow='0 10px 30px rgba(0,0,0,0.7)';
    
    let count=0;
    const shownIds=[];
    dragData.ids.forEach(selId=>{
      const elem=document.querySelector(`.canvas-name[data-id="${selId}"]`);
      if(elem && count<3){
        const clone=elem.cloneNode(true);
        clone.style.margin='3px 0';
        clone.style.fontSize='11px';
        clone.style.padding='4px 8px';
        dragImg.appendChild(clone);
        shownIds.push(selId);
        count++;
      }
    });
    
    if(dragData.ids.length>3){
      const more=document.createElement('div');
      more.textContent=`+${dragData.ids.length-3} more`;
      more.style.fontSize='10px';
      more.style.padding='4px 8px';
      more.style.textAlign='center';
      more.style.color='#60a5fa';
      more.style.fontWeight='600';
      more.style.borderTop='1px solid #444';
      dragImg.appendChild(more);
    }
    
    document.body.appendChild(dragImg);
    e.dataTransfer.setDragImage(dragImg,60,20);
    setTimeout(()=>dragImg.remove(),0);
  } else {
    // Single drag
    dragData={type:'single',id,source:'canvas',srcEl:src};
  }
  e.dataTransfer.effectAllowed='move';
  
  // Add live placeholder effect on all drop zones
  document.addEventListener('dragover',onCanvasDragOver);
}

function onCanvasDragOver(e){
  if(!dragData || dragData.source !== 'canvas') return;
  e.preventDefault();
  
  // Find target drop zone
  const dropZone = e.target.closest('.zone-names, .standby-names');
  if(!dropZone) return;
  
  const children = [...dropZone.children].filter(ch => !ch.classList.contains('canvas-placeholder'));
  const clientY = e.clientY;
  
  // Remove existing placeholder
  dropZone.querySelectorAll('.canvas-placeholder').forEach(p=>p.remove());
  
  // Find insert position and create placeholder
  let insertBefore = null;
  for(const ch of children){
    const cr=ch.getBoundingClientRect();
    if(clientY < cr.top + cr.height/3){
      insertBefore=ch;
      break;
    }
  }
  
  const placeholder = document.createElement('div');
  placeholder.className = 'canvas-placeholder';
  
  if(insertBefore){
    dropZone.insertBefore(placeholder, insertBefore);
  } else {
    dropZone.appendChild(placeholder);
  }
}

function handleDrop(targetEl, e){
  if(!dragData) return;
  const ids = dragData.type==='multi' ? dragData.ids : [dragData.id];
  
  // Find insert position dengan deteksi area atas yang lebih sensitive
  const rect = targetEl.getBoundingClientRect();
  const children = [...targetEl.children].filter(ch => !ch.classList.contains('canvas-placeholder'));
  let insertBefore = null;
  const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY) || 0;
  
  // Deteksi posisi drop dengan cara:
  // 1. Jika di atas setengah dari elemen pertama → insert di awal (insertBefore = first child)
  // 2. Jika di bawah setengah dari elemen, cari elemen berikutnya
  // 3. Jika tidak ada elemen berikutnya atau di bawah semua → append di akhir (insertBefore = null)
  
  for(const ch of children){
    const cr=ch.getBoundingClientRect();
    // Gunakan 1/3 dari atas untuk deteksi yang lebih sensitive di area atas
    if(clientY < cr.top + cr.height/3){
      insertBefore=ch;
      break;
    }
  }

  const isStandby = targetEl.id === 'standbyNames';
  
  // Remove any existing placeholder first
  document.querySelectorAll('.canvas-placeholder').forEach(p=>p.remove());

  ids.forEach(id=>{
    let entry;
    if(dragData.source==='pool'){
      // Coming from pool list
      const poolIdx=poolNames.findIndex(p=>p.id===id);
      if(poolIdx>=0){
        entry=poolNames.splice(poolIdx,1)[0];
        // Store original color before changing to standby color
        if(isStandby && entry.type === 'worker'){
          if(!entry.originalColor) entry.originalColor = entry.color;
          entry.inStandby = true;
        }
      }
    } else {
      // Coming from canvas (zone or standby)
      const existing=dragData.srcEl?.querySelector(`[data-id="${id}"]`);
      if(existing){
        entry={id, name:existing.querySelector('.nm').textContent, color:existing.dataset.color || existing.dataset.originalColor, type:existing.dataset.type, originalColor:existing.dataset.originalColor};
        if(entry.type === 'worker'){
          // Track original color for restoration when leaving standby
          if(isStandby){
            if(!entry.originalColor) entry.originalColor = entry.color;
            entry.inStandby = true;
          } else if(!isStandby && entry.originalColor){
            entry.inStandby = false;
          }
        }
        existing.remove();
      }
    }
    if(entry){
      const node=createCanvasName(entry);
      if(insertBefore) targetEl.insertBefore(node, insertBefore);
      else targetEl.appendChild(node);
    }
  });

  // Remove any lingering placeholders
  document.querySelectorAll('.canvas-placeholder').forEach(p=>p.remove());
  
  selectedIds.clear();
  renderPool();
  renumberAll();
  updateCounts();
}

function createCanvasName(entry){
  const d=document.createElement('div');
  
  if(entry.type === 'subheading'){
    d.className='canvas-subheading';
    d.dataset.id=entry.id;
    d.dataset.type='subheading';
    d.draggable=true;
    d.innerHTML=`<span class="num"></span><span class="nm" contenteditable="true">${entry.name.toUpperCase()}</span><span class="del" title="Remove">✕</span>`;
    
    // Allow inline editing
    d.querySelector('.nm').addEventListener('click',e=>e.stopPropagation());
    d.querySelector('.nm').addEventListener('blur',()=>{
      const newText = d.querySelector('.nm').textContent.trim().toUpperCase();
      if(!newText) d.querySelector('.nm').textContent = entry.name.toUpperCase();
      else entry.name = newText;
    });
    
    d.addEventListener('dragstart',onCanvasDragStart);
    d.addEventListener('touchstart',onTouchStart,{passive:false});
    d.addEventListener('click',e=>{
      if(e.target.closest('.del'))return;
      if(e.shiftKey || e.ctrlKey){
        if(selectedIds.has(entry.id)){
          selectedIds.delete(entry.id);
          d.classList.remove('selected-name');
        } else {
          selectedIds.add(entry.id);
          d.classList.add('selected-name');
        }
      } else {
        selectedIds.clear();
        document.querySelectorAll('.selected-name').forEach(n=>n.classList.remove('selected-name'));
        selectedIds.add(entry.id);
        d.classList.add('selected-name');
      }
    });
    d.querySelector('.del').addEventListener('click',()=>{
      const name=d.querySelector('.nm').textContent;
      selectedIds.delete(entry.id);
      d.remove();
      poolNames.push({id:entry.id, name, type:'subheading', color:entry.color});
      renderPool();
      renumberAll();
      updateCounts();
    });
  } else {
    d.className='canvas-name';
    d.dataset.id=entry.id;
    d.dataset.type='worker';
    d.dataset.originalColor=entry.originalColor || entry.color;
    d.draggable=true;
    
    // Apply color based on whether it's in standby or not
    const isInStandby = entry.inStandby || false;
    if(isInStandby){
      d.style.background='#E5E7EB';
      d.style.color='#000';
      d.dataset.color='#E5E7EB';
    } else {
      d.style.background=entry.color;
      d.style.color=getContrastTextColor(entry.color);
      d.dataset.color=entry.color;
    }
    d.style.fontWeight='700';
    
    d.innerHTML=`<span class="num"></span><span class="nm">${entry.name}</span><span class="del" title="Remove">✕</span>`;
    d.addEventListener('dragstart',onCanvasDragStart);
    d.addEventListener('touchstart',onTouchStart,{passive:false});
    d.addEventListener('dblclick',e=>{
      // Prevent color picking while in standby
      if(isInStandby) return;
      openColorPicker(e,d);
    });
    d.addEventListener('click',e=>{
      if(e.target.closest('.del'))return;
      if(e.shiftKey || e.ctrlKey){
        if(selectedIds.has(entry.id)){
          selectedIds.delete(entry.id);
          d.classList.remove('selected-name');
        } else {
          selectedIds.add(entry.id);
          d.classList.add('selected-name');
        }
      } else {
        selectedIds.clear();
        document.querySelectorAll('.selected-name').forEach(n=>n.classList.remove('selected-name'));
        selectedIds.add(entry.id);
        d.classList.add('selected-name');
      }
    });
    d.querySelector('.del').addEventListener('click',()=>{
      const name=d.querySelector('.nm').textContent;
      const originalColor=d.dataset.originalColor || d.dataset.color;
      selectedIds.delete(entry.id);
      d.remove();
      
      // Restore to pool with original color
      poolNames.push({id:entry.id, name, type:'worker', color:originalColor});
      
      // Sort to maintain original category order and within-category insertion order
      const catOrder={blue:0,yellow:1,orange:2,red:3,green:4,pink:5,purple:6,gray:7};
      poolNames.sort((a,b)=>{
        const catA=Object.keys(COLORS).find(k=>COLORS[k]===a.color)||'gray';
        const catB=Object.keys(COLORS).find(k=>COLORS[k]===b.color)||'gray';
        const oa=catOrder[catA]||7, ob=catOrder[catB]||7;
        if(oa!==ob) return oa-ob;
        
        // Within same category, maintain insertion order from INITIAL_POOL
        const originalCat = INITIAL_POOL.find(g=>COLORS[g.cat]===a.color);
        if(oa===catOrder[catA]){
          const origIdxA = originalCat?.names.indexOf(a.name) ?? 999;
          const origIdxB = originalCat?.names.indexOf(b.name) ?? 999;
          if(origIdxA!==999 && origIdxB!==999) return origIdxA-origIdxB;
        }
        return 0;
      });
      
      renderPool();
      renumberAll();
      updateCounts();
    });
  }
  return d;
}

// ---- AUTO NUMBERING ----
function renumberAll(){
  document.querySelectorAll('.zone-names').forEach(z=>{
    const items=[...z.querySelectorAll('.canvas-name')];
    const groups={};
    items.forEach(it=>{
      // Skip subheadings - don't create groups for them
      if(it.dataset.type === 'subheading') return;
      const c=it.dataset.color;
      if(!groups[c])groups[c]=[];
      groups[c].push(it);
    });
    // Number workers by color group, skip subheadings entirely
    items.forEach(it=>{
      if(it.dataset.type === 'subheading'){
        it.querySelector('.num').textContent='';
        return;
      }
      const c=it.dataset.color;
      const idx=groups[c].indexOf(it);
      it.querySelector('.num').textContent=(idx+1)+'.';
    });
  });
  // Standby - simple numbering (skip subheadings)
  const sb=[...document.querySelectorAll('#standbyNames .canvas-name')];
  sb.forEach((it,i)=>{
    if(it.dataset.type === 'subheading'){
      it.querySelector('.num').textContent='';
    } else {
      it.querySelector('.num').textContent=(i+1)+'.';
    }
  });
  
  // Trigger auto-scaling after renumbering
  fitContentToCanvas();
}

function updateCounts(){
  const workNames=document.querySelectorAll('.zone-names .canvas-name:not([data-type="subheading"])');
  const sbNames=document.querySelectorAll('#standbyNames .canvas-name:not([data-type="subheading"])');
  document.getElementById('countWork').textContent=workNames.length;
  document.getElementById('countStandby').textContent=sbNames.length;
  
  // Trigger auto-scaling after count update
  fitContentToCanvas();
}

// ---- AUTO-SCALING & DYNAMIC LAYOUT ----
function fitContentToCanvas(){
  const innerContent = document.getElementById('inner-content');
  const a4Canvas = document.getElementById('a4-canvas');
  
  if(!innerContent || !a4Canvas) return;
  
  // Force reflow to get accurate heights
  const contentHeight = innerContent.scrollHeight;
  const a4HeightPx = 1123; // Fixed A4 height in pixels (794x1123)
  
  // Calculate zoom ratio
  let zoomRatio = 1;
  if(contentHeight > a4HeightPx){
    zoomRatio = a4HeightPx / contentHeight;
    // Clamp between 0.5 and 1 to maintain readability
    zoomRatio = Math.max(0.5, Math.min(1, zoomRatio));
  }
  
  // Apply zoom to inner-content (not transform scale, which breaks html2canvas)
  innerContent.style.zoom = zoomRatio;
  
  // Dynamic font size adjustment based on zone count
  const zoneCount = document.querySelectorAll('.zone-box').length;
  let fontScaleFactor = 1;
  
  if(zoneCount > 9){
    fontScaleFactor = 0.85; // 15% reduction
  } else if(zoneCount > 6){
    fontScaleFactor = 0.92; // 8% reduction
  }
  
  // Apply dynamic gap based on zoom
  const zonesGrid = document.getElementById('zonesGrid');
  if(zonesGrid){
    if(zoomRatio < 0.7){
      zonesGrid.style.gap = '2px';
    } else if(zoomRatio < 0.8){
      zonesGrid.style.gap = '3px';
    } else if(zoomRatio < 0.9){
      zonesGrid.style.gap = '4px';
    } else {
      zonesGrid.style.gap = '6px';
    }
  }
}

// ---- MARQUEE SELECTION (GLOBAL) ----
let marqueeStartInViewport = null;

document.addEventListener('mousedown',e=>{
  // Don't start marquee if clicking on interactive elements
  if(e.target.closest('.canvas-name,.pool-item,.zone-label,.zone-title,.zone-subtitle,[contenteditable],.color-popup,.btn-sm,button,input,select'))return;
  if(e.button!==0)return;
  
  marqueeActive=true;
  marqueeStartInViewport={x:e.clientX, y:e.clientY};
  marqueeStart={x:e.clientX, y:e.clientY};
  
  // Only clear selection if shift/ctrl not held
  if(!e.shiftKey && !e.ctrlKey) {
    selectedIds.clear();
    document.querySelectorAll('.selected-name').forEach(n=>n.classList.remove('selected-name'));
  }
  
  const m=document.getElementById('marquee');
  m.style.display='block';
  m.style.left=marqueeStartInViewport.x+'px';
  m.style.top=marqueeStartInViewport.y+'px';
  m.style.width='0';
  m.style.height='0';
});

document.addEventListener('mousemove',e=>{
  if(!marqueeActive)return;
  const m=document.getElementById('marquee');
  const x=Math.min(marqueeStartInViewport.x,e.clientX);
  const y=Math.min(marqueeStartInViewport.y,e.clientY);
  const w=Math.abs(e.clientX-marqueeStartInViewport.x);
  const h=Math.abs(e.clientY-marqueeStartInViewport.y);
  m.style.left=x+'px';
  m.style.top=y+'px';
  m.style.width=w+'px';
  m.style.height=h+'px';
  
  // Real-time collision detection for BOTH canvas names AND pool items
  const mr=m.getBoundingClientRect();
  const shouldAddMode = e.shiftKey || e.ctrlKey;
  
  // Check canvas names (zones + standby)
  document.querySelectorAll('.canvas-name').forEach(n=>{
    const r=n.getBoundingClientRect();
    const isIntersecting=r.left<mr.right&&r.right>mr.left&&r.top<mr.bottom&&r.bottom>mr.top;
    const isSelected=selectedIds.has(n.dataset.id);
    
    if(isIntersecting && !isSelected){
      selectedIds.add(n.dataset.id);
      n.classList.add('selected-name');
    } else if(!isIntersecting && isSelected && !shouldAddMode){
      selectedIds.delete(n.dataset.id);
      n.classList.remove('selected-name');
    }
  });
  
  // Check pool items (sidebar pool list)
  document.querySelectorAll('.pool-item').forEach(n=>{
    const r=n.getBoundingClientRect();
    const isIntersecting=r.left<mr.right&&r.right>mr.left&&r.top<mr.bottom&&r.bottom>mr.top;
    const isSelected=selectedIds.has(n.dataset.id);
    
    if(isIntersecting && !isSelected){
      selectedIds.add(n.dataset.id);
      n.classList.add('selected-name');
    } else if(!isIntersecting && isSelected && !shouldAddMode){
      selectedIds.delete(n.dataset.id);
      n.classList.remove('selected-name');
    }
  });
});

document.addEventListener('mouseup',e=>{
  if(!marqueeActive)return;
  marqueeActive=false;
  const m=document.getElementById('marquee');
  m.style.display='none';
});

// ---- TOUCH DND ----
let touchClone=null, touchSource=null, touchId=null;
function onTouchStart(e){
  if(e.touches.length!==1)return;
  const el=e.currentTarget;
  const touch=e.touches[0];
  const startX=touch.clientX, startY=touch.clientY;
  let moved=false;

  const onMove=ev=>{
    ev.preventDefault();
    const t=ev.touches[0];
    if(!moved&&Math.abs(t.clientX-startX)+Math.abs(t.clientY-startY)<8)return;
    if(!moved){
      moved=true;
      const isPool=!!el.closest('#poolList');
      touchId=el.dataset.id;
      touchSource=isPool?'pool':'canvas';
      touchClone=el.cloneNode(true);
      touchClone.style.position='fixed';
      touchClone.style.zIndex='9999';
      touchClone.style.width=el.offsetWidth+'px';
      touchClone.style.opacity='.8';
      touchClone.style.pointerEvents='none';
      document.body.appendChild(touchClone);
      if(isPool){
        dragData={type:'single',id:touchId,source:'pool'};
      } else {
        dragData={type:'single',id:touchId,source:'canvas',srcEl:el.closest('.zone-names,.standby-names')};
      }
    }
    touchClone.style.left=(t.clientX-40)+'px';
    touchClone.style.top=(t.clientY-12)+'px';
  };

  const onEnd=ev=>{
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    if(touchClone){
      touchClone.remove();touchClone=null;
      const t=ev.changedTouches[0];
      const dropEl=document.elementFromPoint(t.clientX,t.clientY);
      const zone=dropEl?.closest('.zone-names,.standby-names');
      if(zone && dragData){
        handleDrop(zone,{clientY:t.clientY});
      }
      dragData=null;
    }
  };
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

function applyConfig(config){
  document.getElementById('canvasMainTitle').textContent = config.main_title || defaultConfig.main_title;
  document.getElementById('canvasDayLabel').textContent = config.day_label || defaultConfig.day_label;
  const bg = config.background_color || defaultConfig.background_color;
  const sf = config.surface_color || defaultConfig.surface_color;
  const tx = config.text_color || defaultConfig.text_color;
  const ff = (config.font_family || defaultConfig.font_family) + ', sans-serif';

  document.body.style.background = bg;
