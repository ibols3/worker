  <style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif}
body{background:#000033;color:#e2e8f0;width:100%;height:100%;display:flex;flex-direction:column}

/* ROOT LAYOUT - LOCKED TO SCREEN */
.app-wrap{display:flex;flex-direction:row;height:100%;width:100%;overflow:hidden;gap:0;align-items:stretch}

/* MOBILE FIRST: Drawer Sidebar (Hidden by default) */
.sidebar-left{position:fixed;top:0;left:0;width:280px;height:100%;background:#000044;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;-webkit-user-select:none;user-select:none;z-index:1000;transform:translateX(-100%);transition:transform 0.3s ease;touch-action:none}
.sidebar-left.open{transform:translateX(0)}

/* Mobile Hamburger Menu Button */
.mobile-menu-btn{display:flex;position:fixed;top:12px;left:12px;z-index:999;background:#2563eb;border:none;color:#fff;width:44px;height:44px;border-radius:6px;align-items:center;justify-content:center;cursor:pointer;font-size:20px;padding:0}

/* Mobile Close Button in Sidebar */
.sidebar-close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:#93c5fd;font-size:20px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center}

/* Overlay for drawer */
.drawer-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999}
.drawer-overlay.open{display:block}

.sidebar-right{display:none;width:100%;background:#000044;border-top:1px solid #1e3a5f;padding:12px;max-height:auto;overflow-y:auto;flex-shrink:0}

.canvas-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;justify-content:center;align-items:flex-start;padding:12px;flex-shrink:0;margin-top:56px;width:100%}

.a4-canvas{width:1189px;background:#fff;color:#000;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5);flex-shrink:0;transform-origin:top center;margin:0 auto;display:flex;flex-direction:column;min-height:auto;height:auto}
.a4-inner{padding:48px 56px 56px;display:flex;flex-direction:column;width:100%;height:auto;overflow:visible}

.canvas-header{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;border-bottom:2px solid #000;padding-bottom:8px;align-items:center;text-align:center}
.canvas-logo{flex:0 0 auto;display:flex;align-items:center;justify-content:center;min-height:60px;min-width:80px}
.canvas-logo img{max-height:60px;max-width:100%;object-fit:contain}
.canvas-header-center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;width:100%}
.header-title{font-size:56px;font-weight:800;color:#000;margin-bottom:4px;text-align:center}
.day-selection-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:4px;width:100%}
.day-label-group{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap}
.day-dropdown{background:transparent;border:none;font-size:18px;font-weight:800;color:#000;outline:none;cursor:pointer;padding:0;font-family:inherit;text-align:right;min-width:120px}
.number-dropdown{background:transparent;border:none;font-size:18px;font-weight:800;color:#000;outline:none;cursor:pointer;padding:0;font-family:inherit;text-align:left;min-width:40px}
.day-dropdown:hover,.number-dropdown:hover{opacity:.7}
.canvas-header-right{flex:0 0 auto;display:flex;align-items:center;justify-content:center;min-width:120px}
.date-display{font-size:24px;font-weight:700;color:#ef4444;text-align:center;cursor:pointer;padding:4px 6px;border-radius:4px;transition:background .2s}
.date-display:hover{background:rgba(239,68,68,.1)}

.pool-item{padding:0 8px;margin:2px 4px;border-radius:5px;cursor:grab;font-size:16px;font-weight:600;color:#fff;display:flex;align-items:center;gap:4px;user-select:none;transition:opacity .15s;border:1px solid #333;font-weight:700;touch-action:none;min-height:36px;line-height:36px !important;height:36px !important;vertical-align:middle}
.pool-item.blue{background:#2563eb}
.pool-item.yellow{background:#eab308;color:#000}
.pool-item.orange{background:#f97316;color:#fff}
.pool-item.red{background:#ef4444}
.pool-item.white{background:#fff;color:#000}
.pool-item:active{cursor:grabbing;opacity:.7;transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.3)}

.pool-sub-header{padding:6px 8px;margin:2px 4px;border-radius:5px;font-size:18px;font-weight:700;color:#fff;background:#6b7280;display:flex;align-items:center;user-select:none;touch-action:none;min-height:36px}

.zone-container{border:2px solid #e5e7eb;border-radius:4px;min-height:70px;padding:0;margin:4px;flex:1;max-width:100%;display:flex;flex-direction:column;position:relative}
.zone-header-outside{font-size:14px;font-weight:700;color:#000;background:#9ca3af;padding:3px 4px;border-radius:3px 3px 0 0;cursor:text;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zone-titles{padding:4px;display:flex;flex-direction:column;gap:1px}
.zone-main-title{font-size:10px;font-weight:700;color:#2563eb;outline:none;text-align:left}
.zone-sub-title{font-size:9px;font-weight:700;font-style:italic;color:#ef4444;outline:none;text-align:left}
.zone-body{flex:1;padding:3px;display:flex;flex-direction:column;gap:2px;min-height:60px;width:100%}
.zone-item{padding:0 6px !important;border-radius:3px;font-size:18px;font-weight:600;color:#fff;display:flex !important;flex-direction:row !important;align-items:center !important;justify-content:flex-start !important;gap:3px;cursor:grab;user-select:none;transition:background 0.15s ease;touch-action:none;height:44px !important;min-height:44px !important;line-height:44px !important;flex-wrap:nowrap;text-transform:uppercase;position:relative;margin-left:24px;margin-top:0 !important;margin-bottom:0 !important;vertical-align:middle}
.zone-item:active{cursor:grabbing;transform:scale(1.03);box-shadow:0 2px 8px rgba(0,0,0,.25)}
.zone-item .num{position:absolute;left:-24px;width:20px;height:44px !important;display:flex !important;flex-direction:row !important;align-items:center !important;justify-content:center !important;font-size:14px !important;text-align:center;background:transparent;border-radius:2px;padding:0 !important;color:#000000 !important;font-weight:800 !important;box-shadow:none;line-height:44px !important;letter-spacing:0;margin:0 !important;top:0 !important;transform:none !important;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;vertical-align:middle}
.zone-item .del-btn{margin-left:auto;cursor:pointer;opacity:.5;font-size:8px;padding:3px 4px;min-width:24px;min-height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.zone-item .del-btn:hover{opacity:1;background:rgba(0,0,0,.2)}

.drag-over{background:#e0f2fe!important;border-color:#3b82f6!important}
.drop-indicator{height:2px;background:#3b82f6;border-radius:1px;margin:2px 0;transition:all .1s}
.standby-container{border:2px solid #e5e7eb;border-radius:4px;min-height:70px;padding:0;margin:4px;flex:1;max-width:100%;display:flex;flex-direction:column;position:relative}
.standby-header{background:#9ca3af;color:#000;font-size:14px;font-weight:700;padding:3px 4px;border-radius:3px 3px 0 0;cursor:text;text-align:left}
.standby-body{padding:3px;display:flex;flex-direction:column;gap:2px;min-height:60px;width:100%;flex:1}

.color-picker-popup{position:fixed;z-index:9999;background:#1e293b;border:1px solid #475569;border-radius:8px;padding:8px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.color-picker-popup .swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-picker-popup .swatch:hover{transform:scale(1.15);border-color:#fff}
.marquee-box{position:fixed;border:2px dashed #3b82f6;background:rgba(59,130,246,.1);pointer-events:none;z-index:9998;display:none}
.selected-highlight{outline:2px solid #fbbf24;outline-offset:1px}
.scroll-pool{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:none}
.scroll-pool::-webkit-scrollbar{width:4px}
.scroll-pool::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.canvas-area::-webkit-scrollbar{width:4px}
.canvas-area::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.zone-row{display:flex;flex-wrap:wrap;margin-bottom:0px;gap:0}
.footer-counts{margin-top:8px;font-size:11px;font-weight:700;color:#000;line-height:1.4}
.footer-counts .working{color:#22c55e}
.footer-counts .standby{color:#a855f7}
.calendar-popup{position:fixed;z-index:99999;background:#ffffff;border:2px solid #d1d5db;border-radius:8px;padding:12px;display:none;box-shadow:0 10px 40px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.1);min-width:260px;left:50% !important;top:50% !important;transform:translate(-50%,-50%)}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;gap:6px}
.calendar-header button{background:#2563eb;color:#fff;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-weight:700;font-size:11px;transition:background .2s;min-height:36px}
.calendar-header button:hover{background:#1d4ed8}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.calendar-day-label{text-align:center;font-weight:700;font-size:10px;padding:4px 1px;color:#1f2937;text-transform:uppercase}
.calendar-day{text-align:center;padding:6px 2px;border-radius:4px;cursor:pointer;border:1px solid #e5e7eb;font-size:11px;color:#1f2937;background:#fff;font-weight:500;transition:all .15s;min-height:28px}
.calendar-day:hover{background:#f3f4f6;border-color:#9ca3af}
.calendar-day.selected{background:#2563eb;color:#fff;border-color:#2563eb;font-weight:700}

/* TABLET & DESKTOP (> 768px) - 3-COLUMN LOCKED LAYOUT */
@media(min-width:768px){
  body{display:flex;flex-direction:row;width:100vw;height:100vh;overflow:hidden}
  .app-wrap{flex-direction:row;width:100%;height:100%;zoom:1;transform-origin:top left}
  
  .mobile-menu-btn{display:none}
  .sidebar-close-btn{display:none}
  .drawer-overlay{display:none !important}
  
  /* LEFT SIDEBAR - Fixed width, never hidden */
  .sidebar-left{position:static;width:18%;min-width:180px;max-width:250px;background:#000044;border-right:1px solid #1e3a5f;display:flex !important;flex-direction:column;height:100%;overflow:hidden;flex-shrink:0;transform:none;transition:none}
  
  /* CENTER CANVAS - Grows to fill, constrains A4 canvas */
  .canvas-area{flex:1 1 auto;width:auto;min-width:0;overflow-y:auto;overflow-x:hidden;display:flex;justify-content:center;align-items:flex-start;padding:14px;flex-shrink:0;margin-top:0;background:#000033}
  
  /* RIGHT SIDEBAR - Fixed width, always visible */
  .sidebar-right{display:flex !important;width:18%;min-width:180px;max-width:250px;background:#000044;border-left:1px solid #1e3a5f;flex-direction:column;height:100%;overflow-y:auto;overflow-x:hidden;flex-shrink:0;padding:10px}
  
  /* A4 Canvas - Responsive scaling within center column */
  .a4-canvas{width:1189px;background:#fff;color:#000;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;flex-direction:column;min-height:auto;height:auto}
  .a4-inner{padding:48px 56px 56px;height:auto}
  
  .canvas-header{flex-direction:row;gap:16px;margin-bottom:16px;border-bottom:2px solid #000;padding-bottom:12px}
  .canvas-logo{min-height:90px;min-width:110px}
  .canvas-logo img{max-height:90px}
  .header-title{font-size:56px;font-weight:800;color:#000;margin-bottom:4px;text-align:center}
  .day-dropdown{font-size:18px;min-width:120px}
  .number-dropdown{font-size:18px;min-width:40px}
  .day-selection-row{flex-wrap:nowrap;gap:8px}
  .date-display{font-size:28px;padding:6px 10px}
  
  .pool-item{padding:7px 10px !important;margin:3px 5px;font-size:12px;min-height:42px !important;display:flex !important;align-items:center !important;justify-content:center;line-height:normal !important;vertical-align:middle;flex-direction:row !important}
  .pool-sub-header{padding:8px 10px;margin:5px 5px 2px;font-size:11px;min-height:42px}
  
  .zone-container{min-height:90px;padding:0;margin:8px;max-width:calc(33.333% - 16px)}
  .zone-header-outside{font-size:20px;padding:4px 6px}
  .zone-titles{padding:6px;gap:2px}
  .zone-main-title{font-size:12px}
  .zone-sub-title{font-size:11px}
  .zone-body{padding:5px;min-height:130px}
  .zone-item{padding:7px 10px !important;font-size:18px;min-height:44px !important;display:flex !important;flex-direction:row !important;align-items:center !important;justify-content:flex-start !important;margin-left:24px;margin-top:0 !important;margin-bottom:0 !important;line-height:normal !important}
  .zone-item .num{font-size:8px;min-width:16px;padding:1px 2px !important;left:-24px;height:44px !important;display:flex !important;align-items:center !important;justify-content:center !important;top:50% !important;transform:translateY(-50%) !important;line-height:normal !important;margin:0 !important}
  .zone-item .del-btn{min-width:30px;min-height:30px;font-size:9px}
  .standby-container{min-height:90px;max-width:calc(33.333% - 16px)}
  .standby-header{font-size:20px;padding:4px 6px}
  .standby-body{padding:5px;min-height:130px}
  
  .scroll-pool{flex:1;overflow-y:auto;overflow-x:hidden}
  .scroll-pool::-webkit-scrollbar{width:5px}
  .scroll-pool::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
  
  .footer-counts{font-size:13px}
}

@media(max-width:767px){
  .zone-container{max-width:100%}
  .standby-container{max-width:100%}
}

@media print{
  .sidebar-left,.sidebar-right,.mobile-menu-btn{display:none}
}
</style>

  <script>
// ============ MOBILE DRAWER TOGGLE ============
const mobileMenuBtn=document.getElementById('mobileMenuBtn');
const sidebarLeft=document.getElementById('sidebarLeft');
const sidebarCloseBtn=document.getElementById('sidebarCloseBtn');
const drawerOverlay=document.getElementById('drawerOverlay');

function closeSidebar(){
  sidebarLeft.classList.remove('open');
  drawerOverlay.classList.remove('open');
}

function openSidebar(){
  sidebarLeft.classList.add('open');
  drawerOverlay.classList.add('open');
}

mobileMenuBtn.addEventListener('click',openSidebar);
sidebarCloseBtn.addEventListener('click',closeSidebar);
drawerOverlay.addEventListener('click',closeSidebar);

// Close sidebar when dragging items on mobile
document.addEventListener('touchmove',()=>{
  if(window.innerWidth<=768){
    closeSidebar();
  }
});

// ============ DATA ============
const COLORS={
  blue:'#2563eb',yellow:'#eab308',orange:'#ff6b00',red:'#dc2626',
  green:'#22c55e',pink:'#ec4899',gray:'#6b7280'
};
const PICKER_COLORS=[
  {name:'Red',hex:'#dc2626'},{name:'Blue',hex:'#2563eb'},{name:'Yellow',hex:'#eab308'},
  {name:'Green',hex:'#22c55e'},{name:'Pink',hex:'#ec4899'},{name:'Orange',hex:'#ff6b00'}
];

// ============ DATE & CALENDAR ============
function updateDateDisplay(){
  const days=['MINGGU','SENIN','SELASA','RABU','KAMIS','JUMAT','SABTU'];
  const months=['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  const d=currentDate.getDate();
  const m=months[currentDate.getMonth()];
  const y=currentDate.getFullYear();
  const dayName=days[currentDate.getDay()];
  document.getElementById('dateDisplay').textContent=`${dayName}, ${d} ${m} ${y}`;
}

function openCalendar(){
  const popup=document.getElementById('calendarPopup');
  const grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  
  const month=currentDate.getMonth();
  const year=currentDate.getFullYear();
  document.getElementById('monthYear').textContent=`${['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'][month]} ${year}`;
  
  const days=['MIN','SEN','SEL','RAB','KAM','JUM','SAB'];
  days.forEach(d=>{
    const lbl=document.createElement('div');
    lbl.className='calendar-day-label';
    lbl.textContent=d;
    grid.appendChild(lbl);
  });
  
  const first=new Date(year,month,1).getDay();
  for(let i=0;i<first;i++){
    grid.appendChild(document.createElement('div'));
  }
  
  const daysInMonth=new Date(year,month+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const day=document.createElement('div');
    day.className='calendar-day';
    day.textContent=d;
    if(currentDate.getDate()===d&&currentDate.getMonth()===month&&currentDate.getFullYear()===year){
      day.classList.add('selected');
    }
    day.addEventListener('click',()=>{
      currentDate=new Date(year,month,d);
      updateDateDisplay();
      popup.style.display='none';
    });
    grid.appendChild(day);
  }
  
  popup.style.display='block';
  popup.style.left=(window.innerWidth-300)/2+'px';
  popup.style.top=(window.innerHeight-350)/2+'px';
}

document.getElementById('dateDisplay').addEventListener('click',openCalendar);
document.getElementById('prevMonth').addEventListener('click',()=>{
  currentDate.setMonth(currentDate.getMonth()-1);
  openCalendar();
});
document.getElementById('nextMonth').addEventListener('click',()=>{
  currentDate.setMonth(currentDate.getMonth()+1);
  openCalendar();
});

updateDateDisplay();

// ============ RENDER POOL - GROUPED BY COLOR ============
function renderPool(){
  const el=document.getElementById('poolList');
  el.innerHTML='';
  
  // Group items by color
  const groups={
    [COLORS.blue]:{label:'Team Blue',items:[]},
    [COLORS.yellow]:{label:'Team Yellow',items:[]},
    [COLORS.orange]:{label:'Team Orange',items:[]},
    [COLORS.red]:{label:'Team Red',items:[]},
    '#ffffff':{label:'Misc',items:[]}
  };
  
  // Separate subs from pool items and sort into groups
  const subs=poolItems.filter(p=>p.type==='sub');
  const workers=poolItems.filter(p=>p.type!=='sub');
  
  workers.forEach(item=>{
    const color=item.color||'#ffffff';
    if(groups[color]){
      groups[color].items.push(item);
    }
  });
  
  // Render sub-headers section first
  if(subs.length>0){
    const header=document.createElement('div');
    header.style.cssText='padding:8px 8px 4px;font-size:10px;font-weight:700;color:#93c5fd;text-transform:uppercase;background:rgba(59,130,246,0.1);border-left:3px solid #6b7280;margin-top:0;margin-bottom:2px';
    header.textContent='Sub Headers';
    el.appendChild(header);
    
    subs.forEach(item=>{
      const node=document.createElement('div');
      node.className='pool-sub-header';
      node.dataset.id=item.id;
      node.draggable=true;
      node.textContent=item.name;
      node.style.cursor='grab';
      node.style.marginBottom='2px';
      
      node.addEventListener('dragstart',e=>onPoolDragStart(e,item));
      node.addEventListener('touchstart',e=>onTouchStart(e,'pool',null,item),{passive:false});
      el.appendChild(node);
    });
  }
  
  // Render each worker group
  Object.entries(groups).forEach(([color,group])=>{
    if(group.items.length===0&&color!==COLORS.blue)return; // Only show non-empty groups
    
    // Group header
    const header=document.createElement('div');
    header.style.cssText='padding:8px 8px 4px;font-size:10px;font-weight:700;color:#93c5fd;text-transform:uppercase;background:rgba(59,130,246,0.1);border-left:3px solid '+color+';margin-top:8px;margin-bottom:2px';
    header.textContent=group.label;
    el.appendChild(header);
    
    // Group items
    group.items.forEach(item=>{
      const node=document.createElement('div');
      node.className='pool-item';
      node.dataset.id=item.id;
      node.dataset.color=color;
      node.draggable=true;
      node.textContent=item.name;
      
      // Add color class
      if(color==COLORS.blue)node.classList.add('blue');
      else if(color==COLORS.yellow)node.classList.add('yellow');
      else if(color==COLORS.orange)node.classList.add('orange');
      else if(color==COLORS.red)node.classList.add('red');
      else node.classList.add('white');
      
      node.addEventListener('dragstart',e=>onPoolDragStart(e,item));
      node.addEventListener('touchstart',e=>onTouchStart(e,'pool',null,item),{passive:false});
      el.appendChild(node);
    });
  });
}

// ============ RENDER ZONES ============
function renderZones(){
  const area=document.getElementById('zonesArea');
  area.innerHTML='';

  for(let r=0;r<zones.length;r+=3){
    const row=document.createElement('div');
    row.className='zone-row';
    const chunk=zones.slice(r,r+3);
    chunk.forEach(zone=>{
      const zEl=createZoneElement(zone);
      row.appendChild(zEl);
    });
    for(let f=chunk.length;f<3;f++){
      const spacer=document.createElement('div');
      spacer.style.cssText='flex:1;max-width:calc(33.333% - 16px);margin:8px';
      row.appendChild(spacer);
    }
    area.appendChild(row);
  }
  updateCounts();
}

function createZoneElement(zone){
  const container=document.createElement('div');
  container.className='zone-container';
  container.dataset.zoneId=zone.id;

  const lbl=document.createElement('div');
  lbl.className='zone-header-outside';
  lbl.contentEditable=true;
  lbl.textContent=zone.labelTitle;
  lbl.addEventListener('blur',()=>{zone.labelTitle=lbl.textContent});
  container.appendChild(lbl);

  const titles=document.createElement('div');
  titles.className='zone-titles';
  const mt=document.createElement('span');
  mt.className='zone-main-title';
  mt.contentEditable=true;
  mt.textContent=zone.mainTitle;
  mt.addEventListener('blur',()=>{zone.mainTitle=mt.textContent});
  const st=document.createElement('span');
  st.className='zone-sub-title';
  st.contentEditable=true;
  st.textContent=zone.subTitle;
  st.addEventListener('blur',()=>{zone.subTitle=st.textContent});
  titles.appendChild(mt);
  titles.appendChild(st);
  container.appendChild(titles);

  const body=document.createElement('div');
  body.className='zone-body';
  body.dataset.zoneId=zone.id;

  // Render all items in order, separating workers from sub-headers
  zone.items.forEach((item,idx)=>{
    if(item.type==='sub'){
      // Render sub-header as gray separator block
      const subEl=document.createElement('div');
      subEl.className='pool-sub-header';
      subEl.dataset.itemId=item.id;
      subEl.draggable=true;
      subEl.style.background='#6b7280';
      subEl.style.color='#fff';
      subEl.style.fontWeight='700';
      subEl.style.cursor='text';
      subEl.style.fontSize='20px';
      subEl.contentEditable=true;
      subEl.textContent=item.name;
      
      subEl.addEventListener('blur',()=>{item.name=subEl.textContent});
      subEl.addEventListener('keydown',e=>{
        if(e.key==='Enter'){
          e.preventDefault();
          subEl.blur();
        }
      });
      
      const del=document.createElement('span');
      del.className='del-btn';
      del.style.marginLeft='auto';
      del.style.cursor='pointer';
      del.style.opacity='0.5';
      del.style.fontSize='8px';
      del.style.padding='3px 4px';
      del.style.minWidth='24px';
      del.style.minHeight='24px';
      del.style.display='flex';
      del.style.alignItems='center';
      del.style.justifyContent='center';
      del.style.borderRadius='4px';
      del.style.background='rgba(0,0,0,0.2)';
      del.style.color='#fff';
      del.textContent='✕';
      del.contentEditable=false;
      del.addEventListener('click',e=>{
        e.stopPropagation();
        const idx=zone.items.findIndex(it=>it.id===item.id);
        if(idx>-1){
          poolItems.push(zone.items.splice(idx,1)[0]);
          renderPool();renderZones();
        }
      });
      del.addEventListener('mouseenter',()=>del.style.opacity='1');
      del.addEventListener('mouseleave',()=>del.style.opacity='0.5');
      subEl.appendChild(del);
      
      subEl.addEventListener('dragstart',e=>{
        e.contentEditable=false;
        onZoneDragStart(e,zone.id,item);
      });
      subEl.addEventListener('dragend',e=>{
        e.contentEditable=true;
      });
      subEl.addEventListener('touchstart',e=>onTouchStart(e,'zone',zone.id,item),{passive:false});
      
      body.appendChild(subEl);
    }else{
      // Render worker with numbering
      const workers=zone.items.filter(it=>it.type!=='sub');
      const numbered=computeNumbering(workers);
      const ni=numbered.find(n=>n.id===item.id);
      if(ni){
        body.appendChild(createZoneItemElement(ni,zone.id));
      }
    }
  });

  body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');showDropIndicator(body,e)});
  body.addEventListener('dragleave',()=>{body.classList.remove('drag-over');clearDropIndicators(body)});
  body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');clearDropIndicators(body);onDropInZone(zone.id,body,e)});

  container.appendChild(body);

  const delZ=document.createElement('div');
  delZ.style.cssText='position:absolute;top:2px;right:4px;cursor:pointer;font-size:10px;color:#000;opacity:.5';
  delZ.textContent='✕';
  delZ.addEventListener('click',()=>{
    zone.items.forEach(it=>poolItems.push(it));
    zones=zones.filter(z=>z.id!==zone.id);
    renderPool();
    renderZones();
  });
  container.appendChild(delZ);

  return container;
}

      if(idx>-1){poolItems.push(standbyItems.splice(idx,1)[0]);renderPool();renderStandby();updateCounts()}
    });
    el.appendChild(del);

    el.addEventListener('dragstart',e=>{
      dragData={source:'standby',itemId:item.id,items:[item],selectedIds:new Set([item.id])};
      e.dataTransfer.effectAllowed='move';
    });

    body.appendChild(el);
  });
  updateCounts();

const standbyBody=document.getElementById('standbyBody');
standbyBody.addEventListener('dragover',e=>{e.preventDefault();standbyBody.classList.add('drag-over')});
standbyBody.addEventListener('dragleave',()=>standbyBody.classList.remove('drag-over'));
standbyBody.addEventListener('drop',e=>{
  e.preventDefault();
  standbyBody.classList.remove('drag-over');
  if(!dragData)return;
  const prevSelected=new Set(dragData.selectedIds);
  dragData.items.forEach(item=>{
    removeItemFromSource(item.id,dragData.source,dragData.zoneId);
    standbyItems.push(item);
  });
  dragData=null;
  selectedItems.clear();
  selectedItems.addAll=function(set){for(let v of set)this.add(v)};
  selectedItems.addAll(prevSelected);
  renderPool();
  renderZones();
  renderStandby();
  document.querySelectorAll('.standby-body .zone-item').forEach(el=>{
    if(selectedItems.has(el.dataset.itemId)){
      el.classList.add('selected-highlight');
    }
  });
});

// ============ NUMBERING ============
function computeNumbering(items){
  const colorCount={};
  return items.map(item=>{
    if(!colorCount[item.color])colorCount[item.color]=0;
    colorCount[item.color]++;
    return{...item,num:colorCount[item.color]};
  });
}

// ============ DRAG HANDLERS ============
function onPoolDragStart(e,item){
  const items=selectedItems.has(item.id)?poolItems.filter(p=>selectedItems.has(p.id)):[item];
  dragData={source:'pool',itemId:item.id,items:items.slice(),selectedIds:new Set(items.map(i=>i.id))};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setDragImage(e.target,0,0);
}

function onZoneDragStart(e,zoneId,item){
  let items=[item];
  if(selectedItems.has(item.id)){
    const zone=zones.find(z=>z.id===zoneId);
    if(zone){
      items=zone.items.filter(it=>selectedItems.has(it.id));
    }
  }
  dragData={source:'zone',zoneId,itemId:item.id,items:items.slice(),selectedIds:new Set(items.map(i=>i.id))};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setDragImage(e.target,0,0);
}

function removeItemFromSource(itemId,source,zoneId){
  if(source==='pool'){
    const idx=poolItems.findIndex(p=>p.id===itemId);
    if(idx>-1)poolItems.splice(idx,1);
  }else if(source==='zone'&&zoneId){
    const zone=zones.find(z=>z.id===zoneId);
    if(zone){
      const idx=zone.items.findIndex(it=>it.id===itemId);
      if(idx>-1)zone.items.splice(idx,1);
    }
  }else if(source==='standby'){
    const idx=standbyItems.findIndex(s=>s.id===itemId);
    if(idx>-1)standbyItems.splice(idx,1);
  }
}

function onDropInZone(zoneId,body,e){
  if(!dragData)return;
  const zone=zones.find(z=>z.id===zoneId);
  if(!zone)return;

  const dropIndex=getDropIndex(body,e.clientY);
  const prevSelected=new Set(dragData.selectedIds);
  
  // Step 1: Remove all items from source
  for(const item of dragData.items){
    removeItemFromSource(item.id,dragData.source,dragData.zoneId);
  }
  
  // Step 2: Add all items to destination
  for(const item of dragData.items){
    zone.items.splice(dropIndex,0,{id:item.id,name:item.name,color:item.color,type:item.type});
  }
  
  // Step 3: Clear drag state before render
  dragData=null;
  
  // Step 4: Single coordinated render pass
  renderPool();
  renderZones();
  renderStandby();
  
  // Step 5: Restore selection
  setTimeout(()=>{
    document.querySelectorAll('.zone-item, .pool-item').forEach(el=>{
      const id=el.dataset.itemId||el.dataset.id;
      if(prevSelected.has(id)){
        el.classList.add('selected-highlight');
      }
    });
  },0);
}

function getDropIndex(body,clientY){
  const children=[...body.querySelectorAll('.zone-item')];
  for(let i=0;i<children.length;i++){
    const rect=children[i].getBoundingClientRect();
    if(clientY<rect.top+rect.height/2)return i;
  }
  return children.length;
}

const poolEl=document.getElementById('poolList');
poolEl.addEventListener('dragover',e=>e.preventDefault());
poolEl.addEventListener('drop',e=>{
  e.preventDefault();
  if(!dragData)return;
  const prevSelected=new Set(dragData.selectedIds);
  
  // Step 1: Remove items from source
  for(const item of dragData.items){
    removeItemFromSource(item.id,dragData.source,dragData.zoneId);
  }
  
  // Step 2: Add items back to pool, sorted into their color groups
  for(const item of dragData.items){
    poolItems.push({id:item.id,name:item.name,color:item.color,type:item.type});
  }
  
  // Step 3: Sort pool items by color to maintain grouping
  sortPoolByColor();
  
  // Step 4: Clear drag state
  dragData=null;
  
  // Step 5: Single render pass
  renderPool();
  renderZones();
  renderStandby();
  
  // Step 6: Restore selection
  setTimeout(()=>{
    document.querySelectorAll('#poolList .pool-item').forEach(el=>{
      if(prevSelected.has(el.dataset.id)){
        el.classList.add('selected-highlight');
      }
    });
  },0);
});

function sortPoolByColor(){
  const colorOrder=[COLORS.blue,COLORS.yellow,COLORS.orange,COLORS.red,'#ffffff'];
  poolItems.sort((a,b)=>{
    const colorA=a.color||'#ffffff';
    const colorB=b.color||'#ffffff';
    const indexA=colorOrder.indexOf(colorA);
    const indexB=colorOrder.indexOf(colorB);
    if(indexA!==indexB)return indexA-indexB;
    // Same color group, maintain original order
    return 0;
  });
}

// ============ TOUCH DRAG & LONG-PRESS SELECTION ============
let longPressTimer=null;
let touchSelectMode=false;
let touchStartTime=0;
let touchClone=null;
const LONG_PRESS_DURATION=500;
const TOUCH_MOVE_THRESHOLD=10;

function startLongPressTimer(element,source,zoneId,item){
  longPressTimer=setTimeout(()=>{
    touchSelectMode=true;
    selectedItems.add(item.id);
    element.classList.add('selected-highlight');
    // Haptic feedback on mobile
    if(navigator.vibrate)navigator.vibrate(50);
  },LONG_PRESS_DURATION);
}

function clearLongPressTimer(){
  if(longPressTimer){
    clearTimeout(longPressTimer);
    longPressTimer=null;
  }
}

function onTouchStart(e,source,zoneId,item){
  if(e.touches.length!==1)return;
  const touch=e.touches[0];
  const target=e.currentTarget;
  clearLongPressTimer();
  touchStartTime=Date.now();
  let touchStartX=touch.clientX;
  let touchStartY=touch.clientY;
  let moved=false;
  touchSelectMode=false;

  // Start long-press timer for selection
  startLongPressTimer(target,source,zoneId,item);

  function onMove(ev){
    ev.preventDefault();
    const t=ev.touches[0];
    const dx=Math.abs(t.clientX-touchStartX);
    const dy=Math.abs(t.clientY-touchStartY);
    
    // If moved beyond threshold, cancel long-press
    if((dx+dy)>TOUCH_MOVE_THRESHOLD){
      clearLongPressTimer();
    }
    
    if(!moved&&(dx+dy)<TOUCH_MOVE_THRESHOLD)return;
    
    if(!moved){
      moved=true;
      // If in select mode, don't start drag - it's marquee selection
      if(touchSelectMode)return;
      
      // Otherwise, start regular drag
      let items=[item];
      if(source==='zone'&&zoneId){
        const zone=zones.find(z=>z.id===zoneId);
        if(zone&&selectedItems.has(item.id)){
          items=zone.items.filter(it=>selectedItems.has(it.id));
        }
      }else if(source==='pool'&&selectedItems.has(item.id)){
        items=poolItems.filter(p=>selectedItems.has(p.id));
      }
      dragData={source,zoneId,itemId:item.id,items:items.slice(),selectedIds:new Set(items.map(i=>i.id))};
    }
    
    // If in drag mode, update clone position
    if(dragData&&!touchSelectMode){
      if(!touchClone){
        touchClone=target.cloneNode(true);
        touchClone.style.cssText='position:fixed;z-index:10000;pointer-events:none;opacity:.8;transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.3)';
        document.body.appendChild(touchClone);
      }
      touchClone.style.left=(t.clientX-40)+'px';
      touchClone.style.top=(t.clientY-12)+'px';
      
      // Auto-scroll on edges
      const canvas=document.getElementById('a4Canvas');
      const scroll=document.getElementById('canvasScroll');
      if(canvas){
        if(t.clientY<100){
          scroll.scrollTop=Math.max(0,scroll.scrollTop-5);
        }else if(t.clientY>window.innerHeight-100){
          scroll.scrollTop=scroll.scrollTop+5;
        }
      }
      const pool=document.getElementById('poolList');
      if(pool&&t.clientX<120){
        pool.scrollTop=Math.max(0,pool.scrollTop-3);
      }
    }
  }

  function onEnd(ev){
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    clearLongPressTimer();
    
    // Remove clone immediately
    if(touchClone){
      touchClone.remove();
      touchClone=null;
    }
    
    // If was in select mode but no drag happened, it's just a selection toggle
    if(touchSelectMode&&!moved){
      // Already selected above in startLongPressTimer
      touchSelectMode=false;
      return;
    }
    
    if(!moved||!dragData)return;
    
    const t=ev.changedTouches[0];
    const dropEl=document.elementFromPoint(t.clientX,t.clientY);
    const prevSelected=new Set(dragData.selectedIds);
    
    if(dropEl){
      const zoneBody=dropEl.closest('.zone-body');
      const stBody=dropEl.closest('.standby-body');
      const poolArea=dropEl.closest('.scroll-pool');
      
      if(zoneBody){
        const zId=zoneBody.dataset.zoneId;
        const zone=zones.find(z=>z.id===zId);
        if(zone){
          const di=getDropIndex(zoneBody,t.clientY);
          for(const it of dragData.items){
            removeItemFromSource(it.id,dragData.source,dragData.zoneId);
          }
          for(const it of dragData.items){
            zone.items.splice(di,0,{id:it.id,name:it.name,color:it.color,type:it.type});
          }
        }
      }else if(stBody){
        for(const it of dragData.items){
          removeItemFromSource(it.id,dragData.source,dragData.zoneId);
          standbyItems.push(it);
        }
      }else if(poolArea){
        for(const it of dragData.items){
          removeItemFromSource(it.id,dragData.source,dragData.zoneId);
          poolItems.push(it);
        }
      }
    }
    
    dragData=null;
    touchSelectMode=false;
    
    renderPool();
    renderZones();
    renderStandby();
    
    setTimeout(()=>{
      document.querySelectorAll('.zone-item, .pool-item, .standby-body .zone-item').forEach(el=>{
        const id=el.dataset.itemId||el.dataset.id;
        if(prevSelected.has(id)){
          el.classList.add('selected-highlight');
        }
      });
    },0);
  }

  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

// ============ MARQUEE SELECTION - A1 AWARE ============
let marqueeActive=false;
let marqueeStart={x:0,y:0};
const marqueeBox=document.getElementById('marqueeBox');
let marqueeReady=false;
let marqueeReadyIndicator=null;
let lastMarqueeUpdate=0;

function isPopupOpen(){
  const colorPicker=document.getElementById('colorPicker');
  const calendar=document.getElementById('calendarPopup');
  return(colorPicker&&colorPicker.style.display!=='none')||(calendar&&calendar.style.display!=='none');
}

function isOnInteractiveElement(target){
  return target.closest('.pool-item')||target.closest('.zone-item')||target.closest('input')||target.closest('button')||target.closest('select')||target.closest('textarea')||target.closest('.del-btn');
}

function getCanvasContainerRect(){
  const canvas=document.getElementById('a4Canvas');
  return canvas?canvas.getBoundingClientRect():{top:0,left:0,width:0,height:0};
}

function startMarqueeSelection(startX,startY){
  marqueeActive=true;
  marqueeReady=true;
  marqueeStart={x:startX,y:startY};
  marqueeBox.style.display='block';
  marqueeBox.style.left=startX+'px';
  marqueeBox.style.top=startY+'px';
  marqueeBox.style.width='0';
  marqueeBox.style.height='0';
  selectedItems.clear();
  document.querySelectorAll('.selected-highlight').forEach(el=>el.classList.remove('selected-highlight'));
  
  if(marqueeReadyIndicator){
    marqueeReadyIndicator.remove();
    marqueeReadyIndicator=null;
  }
}

function showMarqueeReadyIndicator(x,y){
  if(marqueeReadyIndicator)marqueeReadyIndicator.remove();
  marqueeReadyIndicator=document.createElement('div');
  marqueeReadyIndicator.style.cssText=`
    position:fixed;
    width:24px;
    height:24px;
    left:${x-12}px;
    top:${y-12}px;
    border:2px solid #3b82f6;
    border-radius:50%;
    background:rgba(59,130,246,0.15);
    pointer-events:none;
    z-index:9997;
    animation:pulseReady 0.3s ease-out;
  `;
  document.body.appendChild(marqueeReadyIndicator);
}

if(!document.getElementById('marquee-animation-style')){
  const style=document.createElement('style');
  style.id='marquee-animation-style';
  style.textContent=`
    @keyframes pulseReady {
      0%{transform:scale(1);opacity:1}
      100%{transform:scale(1.5);opacity:0}
    }
  `;
  document.head.appendChild(style);
}

function updateMarqueeBox(currentX,currentY){
  if(!marqueeReady&&!touchMarqueeReady)return;
  
  const now=Date.now();
  if(now-lastMarqueeUpdate<16)return;
  lastMarqueeUpdate=now;
  
  const x=Math.min(currentX,marqueeStart.x);
  const y=Math.min(currentY,marqueeStart.y);
  const w=Math.abs(currentX-marqueeStart.x);
  const h=Math.abs(currentY-marqueeStart.y);
  
  marqueeBox.style.left=x+'px';
  marqueeBox.style.top=y+'px';
  marqueeBox.style.width=w+'px';
  marqueeBox.style.height=h+'px';

  const mRect={left:x,top:y,right:x+w,bottom:y+h};
  selectedItems.clear();
  
  // Select from pool (left sidebar)
  document.querySelectorAll('#poolList .pool-item').forEach(el=>{
    const r=el.getBoundingClientRect();
    const overlap=!(r.right<mRect.left||r.left>mRect.right||r.bottom<mRect.top||r.top>mRect.bottom);
    if(overlap){
      selectedItems.add(el.dataset.id);
      el.classList.add('selected-highlight');
    }else{
      el.classList.remove('selected-highlight');
    }
  });
  
  // Select from zones (center canvas)
  document.querySelectorAll('.zone-item').forEach(el=>{
    const r=el.getBoundingClientRect();
    const overlap=!(r.right<mRect.left||r.left>mRect.right||r.bottom<mRect.top||r.top>mRect.bottom);
    if(overlap){
      selectedItems.add(el.dataset.itemId);
      el.classList.add('selected-highlight');
    }else{
      el.classList.remove('selected-highlight');
    }
  });
  
  // Select from standby (bottom of canvas)
  document.querySelectorAll('.standby-body .zone-item').forEach(el=>{
    const r=el.getBoundingClientRect();
    const overlap=!(r.right<mRect.left||r.left>mRect.right||r.bottom<mRect.top||r.top>mRect.bottom);
    if(overlap){
      selectedItems.add(el.dataset.itemId);
      el.classList.add('selected-highlight');
    }else{
      el.classList.remove('selected-highlight');
    }
  });
}

function endMarqueeSelection(){
  if(marqueeActive){
    marqueeActive=false;
    marqueeReady=false;
    marqueeBox.style.display='none';
  }
  if(marqueeReadyIndicator){
    marqueeReadyIndicator.remove();
    marqueeReadyIndicator=null;
  }
}

// ============ TOUCH MARQUEE SELECTION WITH LONG-PRESS DELAY ============
let touchMarqueeTimer=null;
let touchMarqueeActive=false;
let touchMarqueeStart={x:0,y:0};
let touchMarqueeReady=false;
const MARQUEE_LONG_PRESS_DURATION=500;
const MARQUEE_TOUCH_THRESHOLD=15;

function startTouchMarqueeTimer(touchX,touchY){
  touchMarqueeTimer=setTimeout(()=>{
    if(isPopupOpen())return;
    touchMarqueeReady=true;
    touchMarqueeActive=true;
    startMarqueeSelection(touchX,touchY);
    if(navigator.vibrate)navigator.vibrate(80);
  },MARQUEE_LONG_PRESS_DURATION);
}

function clearTouchMarqueeTimer(){
  if(touchMarqueeTimer){
    clearTimeout(touchMarqueeTimer);
    touchMarqueeTimer=null;
  }
  touchMarqueeReady=false;
}

document.addEventListener('touchstart',(e)=>{
  if(e.touches.length!==1)return;
  const touch=e.touches[0];
  const target=e.target;
  
  if(isOnInteractiveElement(target)){
    clearTouchMarqueeTimer();
    touchMarqueeActive=false;
    touchMarqueeReady=false;
    endMarqueeSelection();
    return;
  }
  
  if(isPopupOpen()){
    clearTouchMarqueeTimer();
    touchMarqueeActive=false;
    touchMarqueeReady=false;
    endMarqueeSelection();
    return;
  }
  
  touchMarqueeStart={x:touch.clientX,y:touch.clientY};
  clearTouchMarqueeTimer();
  startTouchMarqueeTimer(touch.clientX,touch.clientY);
  showMarqueeReadyIndicator(touch.clientX,touch.clientY);
},{passive:true});

document.addEventListener('touchmove',(e)=>{
  if(e.touches.length!==1){
    clearTouchMarqueeTimer();
    touchMarqueeReady=false;
    endMarqueeSelection();
    return;
  }
  
  const touch=e.touches[0];
  const dx=Math.abs(touch.clientX-touchMarqueeStart.x);
  const dy=Math.abs(touch.clientY-touchMarqueeStart.y);
  
  if((dx+dy)>MARQUEE_TOUCH_THRESHOLD&&!touchMarqueeActive){
    clearTouchMarqueeTimer();
    touchMarqueeReady=false;
    if(marqueeReadyIndicator){
      marqueeReadyIndicator.remove();
      marqueeReadyIndicator=null;
    }
  }
  
  if(touchMarqueeActive&&touchMarqueeReady){
    updateMarqueeBox(touch.clientX,touch.clientY);
    e.preventDefault();
  }
},{passive:false});

document.addEventListener('touchend',(e)=>{
  clearTouchMarqueeTimer();
  if(touchMarqueeActive){
    touchMarqueeActive=false;
    touchMarqueeReady=false;
    endMarqueeSelection();
  }
},{passive:true});

// ============ TWO-FINGER SCROLL GESTURE ============
const scrollPool=document.getElementById('poolList');
let touchStartY=0;
let touchFingerCount=0;

scrollPool.addEventListener('touchstart',(e)=>{
  touchFingerCount=e.touches.length;
  if(touchFingerCount===2){
    touchStartY=e.touches[0].clientY;
    // Cancel any marquee selection on two-finger
    endMarqueeSelection();
    clearTouchMarqueeTimer();
    touchMarqueeActive=false;
    // Enable scrolling for two-finger touch
    e.preventDefault();
  }
},{passive:false});

scrollPool.addEventListener('touchmove',(e)=>{
  if(touchFingerCount===2&&e.touches.length===2){
    const touchCurrentY=e.touches[0].clientY;
    const deltaY=touchStartY-touchCurrentY;
    scrollPool.scrollTop+=deltaY;
    touchStartY=touchCurrentY;
    e.preventDefault();
  }
},{passive:false});


scrollPool.addEventListener('touchend',(e)=>{
  touchFingerCount=e.touches.length;
},{passive:false});

// ============ INIT ============
renderPool();
renderStandby();
const workshopLabel=window.elementSdk?window.elementSdk.config.workshop_label:defaultConfig.workshop_label;
const setLabel=window.elementSdk?window.elementSdk.config.set_label:defaultConfig.set_label;
const bondLabel=window.elementSdk?window.elementSdk.config.bond_label:defaultConfig.bond_label;

zones.push({id:'z1',labelTitle:workshopLabel||'WORKSHOP',mainTitle:'Area Title',subTitle:'Sub-area',items:[]});
zones.push({id:'z2',labelTitle:setLabel||'SET SYUTING',mainTitle:'Area Title',subTitle:'Sub-area',items:[]});
zones.push({id:'z3',labelTitle:bondLabel||'BOND',mainTitle:'Area Title',subTitle:'Sub-area',items:[]});
zoneCounter=3;
renderZones();

lucide.createIcons();
