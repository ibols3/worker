<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I.B.O.L Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    
    .pool-card {
      cursor: move;
      transition: all 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    
    .pool-card.dragging {
      opacity: 0.5;
      transform: scale(0.95);
    }
    
    .zone-wrapper {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .zone-header-wrapper {
      display: flex;
      align-items: flex-end;
      margin-bottom: 8px;
      gap: 12px;
    }

    .zone-header {
      font-size: 16px;
      font-weight: 600;
      color: #4b5563;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .zone-header:hover {
      background: rgba(75, 85, 99, 0.1);
    }
    
    .zone-container {
      min-height: 120px;
      background: #f9f9f9;
      border: 2px dashed #d4a017;
      border-radius: 8px;
      padding: 12px;
      transition: all 0.2s ease;
      position: relative;
    }
    
    .zone-title-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .zone-title {
      font-size: 16px;
      font-weight: bold;
      color: #1e3a8a;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s ease;
      line-height: 0.5;
    }
    
    .zone-title:hover {
      background: rgba(30, 58, 138, 0.1);
    }
    
    .zone-subtitle {
      font-size: 13px;
      color: #ef4444;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s ease;
      line-height: 0.5;
      font-weight: bold;
      font-style: italic;
    }
    
    .zone-subtitle:hover {
      background: rgba(239, 68, 68, 0.1);
    }
    
    .title-edit-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 20px;
      z-index: 1001;
      min-width: 350px;
    }
    
    .title-edit-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }
    
    .zone-container.drag-over {
      background: #fff3cd;
      border-color: #d4a017;
      box-shadow: inset 0 0 8px rgba(212, 160, 23, 0.2);
    }
    
    .name-in-zone {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      position: relative;
      word-break: break-word;
    }
    
    .name-in-zone:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    
    .name-in-zone.selected {
      outline: 2px solid #000;
      outline-offset: 2px;
    }
    
    .a4-canvas {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .canvas-header {
      padding: 24px;
      border-bottom: 1px solid #e5e7eb;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      align-items: center;
    }
    
    .canvas-body {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    .zone-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    
    .color-picker-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 20px;
      z-index: 1000;
      min-width: 280px;
    }
    
    .color-picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
    
    .color-option {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }
    
    .color-option:hover {
      transform: scale(1.1);
      border-color: #666;
    }
    
    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    
    .left-sidebar {
      width: 280px;
      background: #fafaf8;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .pool-header {
      background: #d4a017;
      color: white;
      padding: 16px;
      font-weight: bold;
      text-align: center;
      font-size: 14px;
      letter-spacing: 1px;
    }
    
    .pool-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .pool-input-section {
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }
    
    .right-sidebar {
      width: 220px;
      background: #fafaf8;
      border-left: 1px solid #e5e7eb;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    .zones-title {
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: #333;
    }
    
    .add-zone-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }
    
    .add-zone-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.3);
    }
    
    .zone-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .zone-item-name {
      flex: 1;
      font-weight: 500;
      color: #333;
      word-break: break-word;
    }
    
    .zone-delete-btn {
      background: #ef4444;
      color: white;
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s ease;
    }
    
    .zone-delete-btn:hover {
      background: #dc2626;
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
    }
    
    .logo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .center-column {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 24px;
      background: #f3f4f6;
    }

    .calendar-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 20px;
      z-index: 1001;
      min-width: 320px;
    }

    .calendar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-weight: bold;
      font-size: 16px;
    }

    .calendar-nav-btn {
      background: #3b82f6;
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .calendar-nav-btn:hover {
      background: #2563eb;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 8px;
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      color: #666;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-day {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }

    .calendar-day:hover:not(.disabled) {
      background: #f0f0f0;
    }

    .calendar-day.other-month {
      color: #ccc;
    }

    .calendar-day.today {
      border-color: #3b82f6;
    }

    .calendar-day.selected {
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    .calendar-day.disabled {
      color: #ccc;
      cursor: not-allowed;
    }

    .calendar-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .calendar-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .calendar-actions .btn-confirm {
      background: #3b82f6;
      color: white;
    }

    .calendar-actions .btn-confirm:hover {
      background: #2563eb;
    }

    .calendar-actions .btn-cancel {
      background: #e5e7eb;
      color: #333;
    }

    .calendar-actions .btn-cancel:hover {
      background: #d1d5db;
    }
  </style>

   <script>
    // === STATE MANAGEMENT ===
    const state = {
      poolNames: [
        // Blue names
        { name: 'Fredy Chidotz', color: '#3b82f6' },

        { name: 'Hamdan', color: '#3b82f6' },

        { name: 'Aditya Arisandi', color: '#fbbf24' },
        { name: 'Kikin', color: '#fbbf24' },
        { name: 'Samsul Hidayat', color: '#fbbf24' },
        // Orange names
        { name: 'Supriyadi', color: '#f97316' },
        { name: 'Hendri', color: '#f97316' },
        { name: 'Basori', color: '#f97316' },
        { name: 'Acep', color: '#f97316' },
        { name: 'Edi', color: '#f97316' },
        { name: 'Sudarmansyah', color: '#f97316' },
        { name: 'Ryan Hermawan', color: '#f97316' },
        { name: 'Iwan A. setiawan', color: '#f97316' },
        // Red names
        { name: 'Heri Suherman', color: '#ef4444' },
        { name: 'Ismail', color: '#ef4444' },
        { name: 'Rahmat', color: '#ef4444' },
        { name: 'Rendi', color: '#ef4444' },
        { name: 'Dafa', color: '#ef4444' },
        { name: 'Anggi Yanuar', color: '#ef4444' },
        { name: 'Caryana', color: '#ef4444' },
        { name: 'Pryambudi', color: '#ef4444' },
        { name: 'Asep A. Setiawan', color: '#ef4444' },
        { name: 'Sandi permana', color: '#ef4444' },
        { name: 'Aditiya A. Aziz', color: '#ef4444' },
        { name: 'Wawan Kurniawan', color: '#ef4444' },
        { name: 'Rizki N. Huda', color: '#ef4444' },
        { name: 'M. Dian Saputra', color: '#ef4444' }
      ],
      zones: [],
      selectedDate: new Date(),
      draggedItem: null,
      activeColorPickerZoneId: null,
      activeColorPickerNameId: null,
      nameColors: {},
      daySelected: 1,
      editingZoneId: null,
      editingFieldType: null,
      tempSelectedDate: new Date(),
      calendarViewMonth: new Date()
    };

    const colors = [
      { name: 'RED', hex: '#ef4444' },
      { name: 'YELLOW', hex: '#fbbf24' },
      { name: 'ORANGE', hex: '#f97316' },
      { name: 'BLUE', hex: '#3b82f6' },
      { name: 'LIGHT PINK', hex: '#fbcfe8' },
      { name: 'GREEN', hex: '#10b981' }
    ];

    // === INITIALIZATION ===
    function init() {
      setupDaySelector();
      setupDateDisplay();
      renderPoolList();
      setupColorGrid();
      setupEventListeners();
      state.selectedDate = new Date();
      updateDateDisplay();
      addInitialZone();
    }

    // === DAY SELECTOR ===
    function setupDaySelector() {
      const selector = document.getElementById('daySelector');
      for (let i = 1; i <= 40; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i;
        selector.appendChild(option);
      }
      selector.addEventListener('change', (e) => {
        state.daySelected = parseInt(e.target.value);
      });
    }

    // === DATE DISPLAY & PICKER ===
    function setupDateDisplay() {
      const dateDisplay = document.getElementById('dateDisplay');
      dateDisplay.addEventListener('click', openCalendarModal);
    }

    function openCalendarModal() {
      state.tempSelectedDate = new Date(state.selectedDate);
      state.calendarViewMonth = new Date(state.selectedDate);
      renderCalendar();
      document.getElementById('calendarOverlay').style.display = 'block';
      document.getElementById('calendarModal').style.display = 'block';
    }

    function closeCalendarModal() {
      document.getElementById('calendarOverlay').style.display = 'none';
      document.getElementById('calendarModal').style.display = 'none';
    }

    function renderCalendar() {
      const monthYear = document.getElementById('calendarMonthYear');
      const daysContainer = document.getElementById('calendarDays');
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      
      monthYear.textContent = `${months[state.calendarViewMonth.getMonth()]} ${state.calendarViewMonth.getFullYear()}`;
      daysContainer.innerHTML = '';

      const firstDay = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth(), 1);
      const lastDay = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth() + 1, 0);
      const prevLastDay = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth(), 0);
      
      const firstDayOfWeek = firstDay.getDay();
      const lastDateOfMonth = lastDay.getDate();
      const lastDateOfPrevMonth = prevLastDay.getDate();

      // Previous month's days
      for (let i = firstDayOfWeek - 1; i >= 0; i--) {
        const day = document.createElement('div');
        day.className = 'calendar-day other-month';
        day.textContent = lastDateOfPrevMonth - i;
        daysContainer.appendChild(day);
      }

      // Current month's days
      const today = new Date();
      for (let date = 1; date <= lastDateOfMonth; date++) {
        const day = document.createElement('div');
        day.className = 'calendar-day';
        day.textContent = date;
        
        const currentDate = new Date(state.calendarViewMonth.getFullYear(), state.calendarViewMonth.getMonth(), date);
        
        // Check if today
        if (currentDate.toDateString() === today.toDateString()) {
          day.classList.add('today');
        }
        
        // Check if selected
        if (currentDate.toDateString() === state.tempSelectedDate.toDateString()) {
          day.classList.add('selected');
        }
        
        day.addEventListener('click', () => {
          state.tempSelectedDate = new Date(currentDate);
          renderCalendar();
        });
        
        daysContainer.appendChild(day);
      }

      // Next month's days
      const totalCells = daysContainer.children.length;
      const remainingCells = 42 - totalCells;
      for (let i = 1; i <= remainingCells; i++) {
        const day = document.createElement('div');
        day.className = 'calendar-day other-month';
        day.textContent = i;
        daysContainer.appendChild(day);
      }
    }

    function confirmCalendarDate() {
      state.selectedDate = new Date(state.tempSelectedDate);
      updateDateDisplay();
      closeCalendarModal();
    }

    document.getElementById('prevMonthBtn').addEventListener('click', () => {
      state.calendarViewMonth.setMonth(state.calendarViewMonth.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonthBtn').addEventListener('click', () => {
      state.calendarViewMonth.setMonth(state.calendarViewMonth.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById('confirmDateBtn').addEventListener('click', confirmCalendarDate);

    document.getElementById('cancelDateBtn').addEventListener('click', closeCalendarModal);

    document.getElementById('calendarOverlay').addEventListener('click', closeCalendarModal);

    function updateDateDisplay() {
      const date = state.selectedDate;
      const daysOfWeek = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      
      const dayName = daysOfWeek[date.getDay()];
      const dayNum = date.getDate();
      const monthName = months[date.getMonth()];
      const yearShort = String(date.getFullYear()).slice(-2);

      document.getElementById('dateDisplay').textContent = `${dayName}, ${dayNum} ${monthName} ${yearShort}`;
    }

    // === POOL LIST RENDERING ===
    function renderPoolList() {
      const poolList = document.getElementById('poolList');
      poolList.innerHTML = '';
      state.poolNames.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'pool-card border border-gray-200 rounded-lg p-3 mb-2 text-sm font-semibold text-white shadow-sm hover:shadow-md';
        card.style.backgroundColor = item.color;
        card.draggable = true;
        card.textContent = item.name;
        card.dataset.index = index;

        card.addEventListener('dragstart', (e) => {
          state.draggedItem = { type: 'pool', name: item.name, index };
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'copy';
        });

        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
        });

        poolList.appendChild(card);
      });
    }

    // === ZONE MANAGEMENT ===
    function addInitialZone() {
      const zone = {
        id: Date.now(),
        names: [],
        zoneName: 'Zone 1',
        title: 'Zone Title',
        subtitle: 'Zone Subtitle'
      };
      state.zones.push(zone);
      renderZones();
      renderZonesList();
    }

    function addZone() {
      const zone = {
        id: Date.now() + Math.random(),
        names: [],
        zoneName: `Zone ${state.zones.length + 1}`,
        title: 'Zone Title',
        subtitle: 'Zone Subtitle'
      };
      state.zones.push(zone);
      renderZones();
      renderZonesList();
    }

    function deleteZone(zoneId) {
      state.zones = state.zones.filter(z => z.id !== zoneId);
      renderZones();
      renderZonesList();
    }

    // === ZONE RENDERING ===
    function renderZones() {
      const grid = document.getElementById('zoneGrid');
      grid.innerHTML = '';

      state.zones.forEach((zone, index) => {
        // Wrapper untuk zone header + container
        const wrapper = document.createElement('div');
        wrapper.className = 'zone-wrapper';

        // Zone Header (OUTSIDE container, above it)
        const headerWrapper = document.createElement('div');
        headerWrapper.className = 'zone-header-wrapper';
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'zone-header';
        headerDiv.textContent = zone.zoneName || `Zone ${index + 1}`;
        headerDiv.addEventListener('click', () => openZoneHeaderEditModal(zone.id));
        headerWrapper.appendChild(headerDiv);
        wrapper.appendChild(headerWrapper);

        // Container (INSIDE)
        const zoneDiv = document.createElement('div');
        zoneDiv.className = 'zone-container';
        zoneDiv.dataset.zoneId = zone.id;

        // Zone Title Container (Title & Subtitle only)
        const titleContainer = document.createElement('div');
        titleContainer.className = 'zone-title-container';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'zone-title';
        titleDiv.textContent = zone.title || 'Zone Title';
        titleDiv.addEventListener('click', () => openTitleEditModal(zone.id, 'title'));
        
        const subtitleDiv = document.createElement('div');
        subtitleDiv.className = 'zone-subtitle';
        subtitleDiv.textContent = zone.subtitle || 'Zone Subtitle';
        subtitleDiv.addEventListener('click', () => openTitleEditModal(zone.id, 'subtitle'));
        
        titleContainer.appendChild(titleDiv);
        titleContainer.appendChild(subtitleDiv);
        zoneDiv.appendChild(titleContainer);

        zoneDiv.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'copy';
          zoneDiv.classList.add('drag-over');
        });

        zoneDiv.addEventListener('dragleave', () => {
          zoneDiv.classList.remove('drag-over');
        });

        zoneDiv.addEventListener('drop', (e) => {
          e.preventDefault();
          zoneDiv.classList.remove('drag-over');

          if (state.draggedItem && state.draggedItem.type === 'pool') {
            const poolItem = state.poolNames[state.draggedItem.index];
            const nameId = `${zone.id}-${Date.now()}`;
            const newNameObj = {
              id: nameId,
              name: state.draggedItem.name,
              color: poolItem.color // Use the original pool color
            };
            zone.names.push(newNameObj);
            
            // Only add the new name to DOM, don't re-render entire zone
            const nameDiv = createNameElement(zone, newNameObj, zoneDiv);
            zoneDiv.appendChild(nameDiv);
          }
        });

        // Render names in zone
        zone.names.forEach(nameObj => {
          const nameDiv = createNameElement(zone, nameObj, zoneDiv);
          zoneDiv.appendChild(nameDiv);
        });

        wrapper.appendChild(zoneDiv);
        grid.appendChild(wrapper);
      });
    }

    function createNameElement(zone, nameObj, parentZoneDiv) {
      const nameDiv = document.createElement('div');
      nameDiv.className = 'name-in-zone';
      nameDiv.style.backgroundColor = nameObj.color || '#e5e7eb';
      nameDiv.textContent = nameObj.name;
      nameDiv.dataset.nameId = nameObj.id;
      nameDiv.dataset.zoneId = zone.id;
      nameDiv.draggable = true;

      let clickCount = 0;
      let clickTimer = null;

      // Single/double click untuk color picker
      nameDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        clickCount++;
        
        if (clickCount === 1) {
          clickTimer = setTimeout(() => {
            clickCount = 0;
          }, 300);
        } else if (clickCount === 2) {
          clearTimeout(clickTimer);
          clickCount = 0;
          state.activeColorPickerZoneId = zone.id;
          state.activeColorPickerNameId = nameObj.id;
          openColorPicker();
        }
      });

      // Drag to reorder
      nameDiv.addEventListener('dragstart', (e) => {
        state.draggedItem = { type: 'name', nameId: nameObj.id, zoneId: zone.id, nameObj: nameObj };
        nameDiv.style.opacity = '0.5';
        e.dataTransfer.effectAllowed = 'move';
      });

      nameDiv.addEventListener('dragend', () => {
        nameDiv.style.opacity = '1';
      });

      nameDiv.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        
        if (state.draggedItem && state.draggedItem.type === 'name') {
          const rect = nameDiv.getBoundingClientRect();
          const midpoint = rect.top + rect.height / 2;
          
          if (e.clientY < midpoint) {
            nameDiv.style.borderTop = '3px solid #d4a017';
            nameDiv.style.borderBottom = 'none';
          } else {
            nameDiv.style.borderTop = 'none';
            nameDiv.style.borderBottom = '3px solid #d4a017';
          }
        }
      });

      nameDiv.addEventListener('dragleave', () => {
        nameDiv.style.borderTop = 'none';
        nameDiv.style.borderBottom = 'none';
      });

      nameDiv.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        nameDiv.style.borderTop = 'none';
        nameDiv.style.borderBottom = 'none';

        if (state.draggedItem && state.draggedItem.type === 'name' && state.draggedItem.zoneId === zone.id) {
          const draggedNameId = state.draggedItem.nameId;
          const targetNameId = nameObj.id;

          if (draggedNameId !== targetNameId) {
            const draggedIndex = zone.names.findIndex(n => n.id === draggedNameId);
            const targetIndex = zone.names.findIndex(n => n.id === targetNameId);

            if (draggedIndex !== -1 && targetIndex !== -1) {
              // Simple swap
              [zone.names[draggedIndex], zone.names[targetIndex]] = [zone.names[targetIndex], zone.names[draggedIndex]];
              
              // Update UI hanya untuk zone ini
              updateZoneNamesUI(zone);
            }
          }
        }
      });

      return nameDiv;
    }

    function updateZoneNamesUI(zone) {
      const zoneContainer = document.querySelector(`[data-zone-id="${zone.id}"]`);
      if (!zoneContainer) return;
      
      // Hapus semua name elements
      const allNames = zoneContainer.querySelectorAll('[data-name-id]');
      allNames.forEach(el => el.remove());
      
      // Re-render names dalam urutan baru
      zone.names.forEach(nameItem => {
        const newNameDiv = createNameElement(zone, nameItem, zoneContainer);
        zoneContainer.appendChild(newNameDiv);
      });
    }

    function renderZonesList() {
      const list = document.getElementById('zonesList');
      list.innerHTML = '';

      state.zones.forEach((zone, index) => {
        const item = document.createElement('div');
        item.className = 'zone-item';
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'zone-item-name';
        nameSpan.textContent = `Zone ${index + 1}`;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'zone-delete-btn';
        deleteBtn.textContent = '×';
        deleteBtn.addEventListener('click', () => deleteZone(zone.id));

        item.appendChild(nameSpan);
        item.appendChild(deleteBtn);
        list.appendChild(item);
      });
    }

    // === COLOR PICKER ===
    function setupColorGrid() {
      const grid = document.getElementById('colorGrid');
      colors.forEach(color => {
        const option = document.createElement('div');
        option.className = 'color-option';
        option.style.backgroundColor = color.hex;
        option.title = color.name;
        option.addEventListener('click', () => {
          applyColor(color.hex);
          closeColorPicker();
        });
        grid.appendChild(option);
      });
    }

    function openColorPicker() {
      document.getElementById('colorPickerOverlay').style.display = 'block';
      document.getElementById('colorPickerModal').style.display = 'block';
    }

    function closeColorPicker() {
      document.getElementById('colorPickerOverlay').style.display = 'none';
      document.getElementById('colorPickerModal').style.display = 'none';
    }

    function applyColor(hex) {
      if (state.activeColorPickerZoneId !== null && state.activeColorPickerNameId !== null) {
        const zone = state.zones.find(z => z.id === state.activeColorPickerZoneId);
        if (zone) {
          const nameObj = zone.names.find(n => n.id === state.activeColorPickerNameId);
          if (nameObj) {
            nameObj.color = hex;
            // Find the specific name element by both zone ID and name ID, update ONLY its color
            const nameElement = document.querySelector(`[data-name-id="${state.activeColorPickerNameId}"][data-zone-id="${state.activeColorPickerZoneId}"]`);
            if (nameElement) {
              nameElement.style.backgroundColor = hex;
            }
          }
        }
      }
    }

    // === TITLE EDIT MODAL ===
    function openTitleEditModal(zoneId, fieldType) {
      const zone = state.zones.find(z => z.id === zoneId);
      if (!zone) return;

      state.editingZoneId = zoneId;
      state.editingFieldType = fieldType;
      
      if (fieldType === 'title') {
        document.getElementById('editTitleInput').value = zone.title || '';
        document.getElementById('editSubtitleInput').value = zone.subtitle || '';
      }
      
      document.getElementById('titleEditOverlay').style.display = 'block';
      document.getElementById('titleEditModal').style.display = 'block';
    }

    function openZoneHeaderEditModal(zoneId) {
      const zone = state.zones.find(z => z.id === zoneId);
      if (!zone) return;

      state.editingZoneId = zoneId;
      document.getElementById('editHeaderInput').value = zone.zoneName || '';
      document.getElementById('headerEditOverlay').style.display = 'block';
      document.getElementById('headerEditModal').style.display = 'block';
      document.getElementById('editHeaderInput').focus();
    }

    function closeHeaderEditModal() {
      document.getElementById('headerEditOverlay').style.display = 'none';
      document.getElementById('headerEditModal').style.display = 'none';
      state.editingZoneId = null;
    }

    function saveHeaderEdit() {
      if (state.editingZoneId === null) return;

      const zone = state.zones.find(z => z.id === state.editingZoneId);
      if (zone) {
        const headerValue = document.getElementById('editHeaderInput').value.trim();
        if (headerValue) {
          zone.zoneName = headerValue;
          renderZones();
          renderZonesList();
        }
      }
      closeHeaderEditModal();
    }

    function closeTitleEditModal() {
      document.getElementById('titleEditOverlay').style.display = 'none';
      document.getElementById('titleEditModal').style.display = 'none';
      state.editingZoneId = null;
    }

    function saveTitleEdit() {
      if (state.editingZoneId === null) return;

      const zone = state.zones.find(z => z.id === state.editingZoneId);
      if (zone) {
        const titleValue = document.getElementById('editTitleInput').value || 'Zone Title';
        const subtitleValue = document.getElementById('editSubtitleInput').value || 'Zone Subtitle';
        
        if (state.editingFieldType === 'title') {
          zone.title = titleValue;
          zone.subtitle = subtitleValue;
        }
        
        renderZones();
      }
      closeTitleEditModal();
    }

    // === EVENT LISTENERS ===
    function setupEventListeners() {
      document.getElementById('addZoneBtn').addEventListener('click', addZone);

      document.getElementById('addNameBtn').addEventListener('click', () => {
        const input = document.getElementById('customNameInput');
        const name = input.value.trim();
        if (name) {
          state.poolNames.push({ name: name, color: '#d1d5db' });
          renderPoolList();
          input.value = '';
        }
      });

      document.getElementById('customNameInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('addNameBtn').click();
        }
      });

      document.getElementById('colorPickerOverlay').addEventListener('click', closeColorPicker);

      document.getElementById('titleEditOverlay').addEventListener('click', closeTitleEditModal);

      document.getElementById('saveTitleBtn').addEventListener('click', saveTitleEdit);

      document.getElementById('cancelTitleBtn').addEventListener('click', closeTitleEditModal);

      document.getElementById('headerEditOverlay').addEventListener('click', closeHeaderEditModal);

      document.getElementById('saveHeaderBtn').addEventListener('click', saveHeaderEdit);

      document.getElementById('cancelHeaderBtn').addEventListener('click', closeHeaderEditModal);

      document.getElementById('editHeaderInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          saveHeaderEdit();
        }
      });

      document.getElementById('editTitleInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          saveTitleEdit();
        }
      });

      document.getElementById('editSubtitleInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          saveTitleEdit();
        }
      });

      // Element SDK initialization
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig: { main_title: 'I.B.O.L' },
          onConfigChange: (config) => {
            if (config.main_title) {
              document.getElementById('mainTitle').textContent = config.main_title;
            }
          },
          mapToCapabilities: () => ({
            recolorables: [],
            borderables: [],
            fontEditable: undefined,
            fontSizeable: undefined
          }),
          mapToEditPanelValues: (config) => new Map([['main_title', config.main_title]])
        });
      }
    }

    // Start app
    init();
  </script>
