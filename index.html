  <style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif}
body{background:#000033;color:#e2e8f0}
.app-wrap{display:flex;height:100%;width:100%;overflow:hidden}
.sidebar-left{width:240px;min-width:240px;background:#000044;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;height:100%;overflow:hidden}
.sidebar-right{width:220px;min-width:220px;background:#000044;border-left:1px solid #1e3a5f;display:flex;flex-direction:column;height:100%;overflow:hidden}
.canvas-area{flex:1;overflow:auto;display:flex;justify-content:center;padding:20px;align-items:flex-start}
.a4-canvas{width:1189px;min-height:1682px;background:#fff;color:#000;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5);flex-shrink:0;transform-origin:top center}
.a4-inner{padding:24px 32px 32px;display:flex;flex-direction:column}
.canvas-header{display:flex;gap:20px;margin-bottom:20px;border-bottom:2px solid #000;padding-bottom:16px}
.canvas-logo{flex:0 0 auto;display:flex;align-items:center;justify-content:center;min-height:100px;min-width:120px}
.canvas-logo img{max-height:100px;max-width:100%;object-fit:contain}
.canvas-header-center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.header-title{font-size:48px;font-weight:800;color:#000;margin-bottom:8px}
.day-selection-row{display:flex;align-items:center;justify-content:center;gap:10px}
.day-label-group{display:flex;align-items:center;justify-content:center;gap:10px}
.day-dropdown{background:transparent;border:none;font-size:32px;font-weight:800;color:#000;outline:none;cursor:pointer;padding:0;font-family:inherit;text-align:right;min-width:180px}
.number-dropdown{background:transparent;border:none;font-size:32px;font-weight:800;color:#000;outline:none;cursor:pointer;padding:0;font-family:inherit;text-align:left;min-width:60px}
.day-dropdown:hover,.number-dropdown:hover{opacity:.7}
.canvas-header-right{flex:0 0 auto;display:flex;align-items:center;justify-content:center;min-width:180px}
.date-display{font-size:20px;font-weight:700;color:#ef4444;text-align:center;cursor:pointer;padding:8px 12px;border-radius:4px;transition:background .2s}
.date-display:hover{background:rgba(239,68,68,.1)}
.pool-item{padding:8px 10px;margin:3px 6px;border-radius:5px;cursor:grab;font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px;user-select:none;transition:opacity .15s;border:1px solid #333;font-weight:700}
.pool-item.blue{background:#2563eb}
.pool-item.yellow{background:#eab308;color:#000}
.pool-item.orange{background:#f97316;color:#fff}
.pool-item.red{background:#ef4444}
.pool-item.white{background:#fff;color:#000}
.pool-item:active{cursor:grabbing;opacity:.7}
.pool-sub-header{padding:8px 10px;margin:6px 6px 3px;border-radius:5px;font-size:11px;font-weight:700;color:#000;background:#6b7280;display:flex;align-items:center;user-select:none}
.zone-container{border:2px solid #e5e7eb;border-radius:4px;min-height:100px;padding:0;margin:8px;flex:1;max-width:calc(33.333% - 16px);display:flex;flex-direction:column;position:relative}
.zone-header-outside{font-size:26px;font-weight:700;color:#000;background:#9ca3af;padding:6px 8px;border-radius:3px 3px 0 0;cursor:text;text-align:left}
.zone-titles{padding:8px;display:flex;flex-direction:column;gap:4px}
.zone-main-title{font-size:14px;font-weight:700;color:#2563eb;outline:none;text-align:left}
.zone-sub-title{font-size:12px;font-weight:700;font-style:italic;color:#ef4444;outline:none;text-align:left}
.zone-body{flex:1;padding:6px;display:flex;flex-direction:column;gap:2px;min-height:150px;width:100%}
.zone-item{padding:4px 8px;border-radius:3px;font-size:11px;font-weight:600;color:#fff;display:flex;align-items:center;gap:4px;cursor:grab;user-select:none}
.zone-item:active{cursor:grabbing}
.zone-item .num{font-size:9px;min-width:18px;text-align:center;background:rgba(0,0,0,.25);border-radius:2px;padding:1px 2px}
.zone-item .del-btn{margin-left:auto;cursor:pointer;opacity:.5;font-size:10px;padding:0 2px}
.zone-item .del-btn:hover{opacity:1}
.drag-over{background:#e0f2fe!important;border-color:#3b82f6!important}
.drop-indicator{height:2px;background:#3b82f6;border-radius:1px;margin:2px 0;transition:all .1s}
.standby-container{border:2px solid #e5e7eb;border-radius:4px;min-height:100px;padding:0;margin:8px;flex:1;max-width:calc(33.333% - 16px);display:flex;flex-direction:column;position:relative}
.standby-header{background:#9ca3af;color:#000;font-size:26px;font-weight:700;padding:6px 8px;border-radius:3px 3px 0 0;cursor:text;text-align:left}
.standby-body{padding:6px;display:flex;flex-direction:column;gap:2px;min-height:150px;width:100%;flex:1}
.color-picker-popup{position:fixed;z-index:9999;background:#1e293b;border:1px solid #475569;border-radius:8px;padding:10px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.color-picker-popup .swatch{width:32px;height:32px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-picker-popup .swatch:hover{transform:scale(1.15);border-color:#fff}
.marquee-box{position:fixed;border:2px dashed #3b82f6;background:rgba(59,130,246,.1);pointer-events:none;z-index:9998;display:none}
.selected-highlight{outline:2px solid #fbbf24;outline-offset:1px}
.scroll-pool{flex:1;overflow-y:auto;overflow-x:hidden}
.scroll-pool::-webkit-scrollbar{width:5px}
.scroll-pool::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.canvas-area::-webkit-scrollbar{width:8px}
.canvas-area::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.zone-row{display:flex;flex-wrap:nowrap;margin-bottom:4px;gap:0}
.footer-counts{margin-top:16px;font-size:14px;font-weight:700;color:#000}
.footer-counts .working{color:#22c55e}
.footer-counts .standby{color:#a855f7}
.calendar-popup{position:fixed;z-index:99999;background:#ffffff;border:2px solid #d1d5db;border-radius:8px;padding:16px;display:none;box-shadow:0 10px 40px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.1);min-width:300px}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e5e7eb}
.calendar-header button{background:#2563eb;color:#fff;border:none;border-radius:4px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:14px;transition:background .2s}
.calendar-header button:hover{background:#1d4ed8}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.calendar-day-label{text-align:center;font-weight:700;font-size:12px;padding:8px 4px;color:#1f2937;text-transform:uppercase}
.calendar-day{text-align:center;padding:10px 8px;border-radius:4px;cursor:pointer;border:1px solid #e5e7eb;font-size:13px;color:#1f2937;background:#fff;font-weight:500;transition:all .15s}
.calendar-day:hover{background:#f3f4f6;border-color:#9ca3af}
.calendar-day.selected{background:#2563eb;color:#fff;border-color:#2563eb;font-weight:700}
@media print{.sidebar-left,.sidebar-right{display:none}}
</style>

  <script>
// ============ DATA ============
const COLORS={
  blue:'#2563eb',yellow:'#eab308',orange:'#ff6b00',red:'#dc2626',
  green:'#22c55e',pink:'#ec4899',gray:'#6b7280'
};
const PICKER_COLORS=[
  {name:'Red',hex:'#dc2626'},{name:'Blue',hex:'#2563eb'},{name:'Yellow',hex:'#eab308'},
  {name:'Green',hex:'#22c55e'},{name:'Pink',hex:'#ec4899'},{name:'Orange',hex:'#ff6b00'}
];

const initialPool=[
  {name:'Fredy Chidotz',color:COLORS.blue},{name:'Deni Sandy',color:COLORS.blue},{name:'Hamdan',color:COLORS.blue},{name:'Iman Udeng',color:COLORS.blue},{name:'Pingki Sopian',color:COLORS.blue},
  {name:'Adi Susanto',color:COLORS.yellow},{name:'Alif',color:COLORS.yellow},{name:'Ikhwani',color:COLORS.yellow},{name:'Yudi',color:COLORS.yellow},{name:'Fahmi',color:COLORS.yellow},{name:'Aditya Arisandi',color:COLORS.yellow},{name:'Kikin',color:COLORS.yellow},{name:'Samsul Hidayat',color:COLORS.yellow},
  {name:'Supriyadi',color:COLORS.orange},{name:'Hendri',color:COLORS.orange},{name:'Basori',color:COLORS.orange},{name:'Acep',color:COLORS.orange},{name:'Edi',color:COLORS.orange},{name:'Sudarmansyah',color:COLORS.orange},{name:'Ryan Hermawan',color:COLORS.orange},{name:'Iwan A. Setiawan',color:COLORS.orange},
  {name:'Heri Suherman',color:COLORS.red},{name:'Ismail',color:COLORS.red},{name:'Rahmat',color:COLORS.red},{name:'Rendi',color:COLORS.red},{name:'Dafa',color:COLORS.red},{name:'Anggi Yanuar',color:COLORS.red},{name:'Caryana',color:COLORS.red},{name:'Pryambudi',color:COLORS.red},{name:'Asep A. Setiawan',color:COLORS.red},{name:'Sandi Permana',color:COLORS.red},{name:'Aditiya A. Aziz',color:COLORS.red},{name:'Wawan Kurniawan',color:COLORS.red},{name:'Rizki N. Huda',color:COLORS.red},{name:'M. Dian Saputra',color:COLORS.red},
  // 35 new RED workers
  {name:'Budi',color:COLORS.red},{name:'Citra',color:COLORS.red},{name:'Doni',color:COLORS.red},{name:'Edo',color:COLORS.red},{name:'Fajar',color:COLORS.red},
  {name:'Guntur',color:COLORS.red},{name:'Hendra',color:COLORS.red},{name:'Iqbal',color:COLORS.red},{name:'Jaka',color:COLORS.red},{name:'Kurnia',color:COLORS.red},
  {name:'Luki',color:COLORS.red},{name:'Mardian',color:COLORS.red},{name:'Nando',color:COLORS.red},{name:'Oki',color:COLORS.red},{name:'Priyo',color:COLORS.red},
  {name:'Qori',color:COLORS.red},{name:'Rudi',color:COLORS.red},{name:'Sapto',color:COLORS.red},{name:'Tedjo',color:COLORS.red},{name:'Udi',color:COLORS.red},
  {name:'Vicky',color:COLORS.red},{name:'Wahyu',color:COLORS.red},{name:'Xeno',color:COLORS.red},{name:'Yanto',color:COLORS.red},{name:'Zaki',color:COLORS.red},
  {name:'Ardhi',color:COLORS.red},{name:'Bayar',color:COLORS.red},{name:'Chandra',color:COLORS.red},{name:'Dwi',color:COLORS.red},{name:'Ejon',color:COLORS.red},
  {name:'Farhan',color:COLORS.red},{name:'Gradi',color:COLORS.red},{name:'Hartono',color:COLORS.red},{name:'Iwan',color:COLORS.red},{name:'Jendra',color:COLORS.red}
];

let poolItems=[...initialPool.map((p,i)=>({...p,id:'p'+i}))];
let nextId=poolItems.length;

// zones: [{id,labelTitle,mainTitle,subTitle,items:[{id,name,color}]}]
let zones=[];
let standbyItems=[];
let zoneCounter=0;

// drag state
let dragData=null; // {source:'pool'|'zone'|'standby', zoneId?, itemId, items:[]}
let selectedItems=new Set();

// calendar state
let currentDate=new Date();

// ============ CONFIG ============
const defaultConfig={
  header_text:'I.B.O.L',
  workshop_label:'WORKSHOP',
  set_label:'SET SYUTING',
  bond_label:'BOND',
  background_color:'#000033',
  surface_color:'#000044',
  text_color:'#93c5fd',
  accent_color:'#2563eb',
  font_family:'Inter',
  font_size:14
};

function applyConfig(cfg){
  document.getElementById('headerTitle').textContent=cfg.header_text||defaultConfig.header_text;
}

if(window.elementSdk){
  window.elementSdk.init({
    defaultConfig,
    onConfigChange:async(cfg)=>applyConfig(cfg),
    mapToCapabilities:(cfg)=>({
      recolorables:[
        {get:()=>cfg.background_color||defaultConfig.background_color,set:v=>{cfg.background_color=v;window.elementSdk.setConfig({background_color:v})}},
        {get:()=>cfg.surface_color||defaultConfig.surface_color,set:v=>{cfg.surface_color=v;window.elementSdk.setConfig({surface_color:v})}},
        {get:()=>cfg.text_color||defaultConfig.text_color,set:v=>{cfg.text_color=v;window.elementSdk.setConfig({text_color:v})}},
        {get:()=>cfg.accent_color||defaultConfig.accent_color,set:v=>{cfg.accent_color=v;window.elementSdk.setConfig({accent_color:v})}}
      ],
      borderables:[],
      fontEditable:{get:()=>cfg.font_family||defaultConfig.font_family,set:v=>{cfg.font_family=v;window.elementSdk.setConfig({font_family:v})}},
      fontSizeable:{get:()=>cfg.font_size||defaultConfig.font_size,set:v=>{cfg.font_size=v;window.elementSdk.setConfig({font_size:v})}}
    }),
    mapToEditPanelValues:(cfg)=>new Map([
      ['header_text',cfg.header_text||defaultConfig.header_text],
      ['workshop_label',cfg.workshop_label||defaultConfig.workshop_label],
      ['set_label',cfg.set_label||defaultConfig.set_label],
      ['bond_label',cfg.bond_label||defaultConfig.bond_label]
    ])
  });
}

// ============ DATE & CALENDAR ============
function updateDateDisplay(){
  const days=['MINGGU','SENIN','SELASA','RABU','KAMIS','JUMAT','SABTU'];
  const months=['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  const d=currentDate.getDate();
  const m=months[currentDate.getMonth()];
  const y=currentDate.getFullYear();
  const dayName=days[currentDate.getDay()];
  document.getElementById('dateDisplay').textContent=`${dayName}, ${d} ${m} ${y}`;
}

function openCalendar(){
  const popup=document.getElementById('calendarPopup');
  const grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  
  const month=currentDate.getMonth();
  const year=currentDate.getFullYear();
  document.getElementById('monthYear').textContent=`${['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'][month]} ${year}`;
  
  const days=['MIN','SEN','SEL','RAB','KAM','JUM','SAB'];
  days.forEach(d=>{
    const lbl=document.createElement('div');
    lbl.className='calendar-day-label';
    lbl.textContent=d;
    grid.appendChild(lbl);
  });
  
  const first=new Date(year,month,1).getDay();
  for(let i=0;i<first;i++){
    grid.appendChild(document.createElement('div'));
  }
  
  const daysInMonth=new Date(year,month+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const day=document.createElement('div');
    day.className='calendar-day';
    day.textContent=d;
    if(currentDate.getDate()===d&&currentDate.getMonth()===month&&currentDate.getFullYear()===year){
      day.classList.add('selected');
    }
    day.addEventListener('click',()=>{
      currentDate=new Date(year,month,d);
      updateDateDisplay();
      popup.style.display='none';
    });
    grid.appendChild(day);
  }
  
  popup.style.display='block';
  popup.style.left=(window.innerWidth-300)/2+'px';
  popup.style.top=(window.innerHeight-350)/2+'px';
}

document.getElementById('dateDisplay').addEventListener('click',openCalendar);
document.getElementById('prevMonth').addEventListener('click',()=>{
  currentDate.setMonth(currentDate.getMonth()-1);
  openCalendar();
});
document.getElementById('nextMonth').addEventListener('click',()=>{
  currentDate.setMonth(currentDate.getMonth()+1);
  openCalendar();
});

updateDateDisplay();

// ============ NUMBER SELECTOR ============
for(let i=1;i<=40;i++){
  const opt=document.createElement('option');
  opt.value=i;
  opt.textContent=i;
  document.getElementById('numberSelect').appendChild(opt);
}

// ============ RENDER POOL ============
function renderPool(){
  const el=document.getElementById('poolList');
  el.innerHTML='';
  poolItems.forEach(item=>{
    let node;
    if(item.type==='sub'){
      node=document.createElement('div');
      node.className='pool-sub-header';
      node.dataset.id=item.id;
      node.textContent=item.name;
      node.draggable=true;
      node.addEventListener('dragstart',e=>onPoolDragStart(e,item));
      node.addEventListener('touchstart',e=>onTouchStart(e,'pool',null,item),{passive:false});
    }else{
      node=document.createElement('div');
      node.className='pool-item';
      node.dataset.id=item.id;
      node.draggable=true;
      node.textContent=item.name;
      
      // Add color class based on hex color
      if(item.color==COLORS.blue)node.classList.add('blue');
      else if(item.color==COLORS.yellow)node.classList.add('yellow');
      else if(item.color==COLORS.orange)node.classList.add('orange');
      else if(item.color==COLORS.red)node.classList.add('red');
      else node.classList.add('white');
      
      node.addEventListener('dragstart',e=>onPoolDragStart(e,item));
      node.addEventListener('touchstart',e=>onTouchStart(e,'pool',null,item),{passive:false});
    }
    el.appendChild(node);
  });
}

// ============ RENDER ZONES ============
function renderZones(){
  const area=document.getElementById('zonesArea');
  area.innerHTML='';

  for(let r=0;r<zones.length;r+=3){
    const row=document.createElement('div');
    row.className='zone-row';
    const chunk=zones.slice(r,r+3);
    chunk.forEach(zone=>{
      const zEl=createZoneElement(zone);
      row.appendChild(zEl);
    });
    for(let f=chunk.length;f<3;f++){
      const spacer=document.createElement('div');
      spacer.style.cssText='flex:1;max-width:calc(33.333% - 16px);margin:8px';
      row.appendChild(spacer);
    }
    area.appendChild(row);
  }
  updateCounts();
}

function createZoneElement(zone){
  const container=document.createElement('div');
  container.className='zone-container';
  container.dataset.zoneId=zone.id;

  const lbl=document.createElement('div');
  lbl.className='zone-header-outside';
  lbl.contentEditable=true;
  lbl.textContent=zone.labelTitle;
  lbl.addEventListener('blur',()=>{zone.labelTitle=lbl.textContent});
  container.appendChild(lbl);

  const titles=document.createElement('div');
  titles.className='zone-titles';
  const mt=document.createElement('span');
  mt.className='zone-main-title';
  mt.contentEditable=true;
  mt.textContent=zone.mainTitle;
  mt.addEventListener('blur',()=>{zone.mainTitle=mt.textContent});
  const st=document.createElement('span');
  st.className='zone-sub-title';
  st.contentEditable=true;
  st.textContent=zone.subTitle;
  st.addEventListener('blur',()=>{zone.subTitle=st.textContent});
  titles.appendChild(mt);
  titles.appendChild(st);
  container.appendChild(titles);

  const body=document.createElement('div');
  body.className='zone-body';
  body.dataset.zoneId=zone.id;

  // Render workers with numbering (excluding sub-headers)
  const workers=zone.items.filter(it=>it.type!=='sub');
  const numbered=computeNumbering(workers);
  numbered.forEach(ni=>{
    body.appendChild(createZoneItemElement(ni,zone.id));
  });

  // Add sub-headers as gray separator blocks (no numbering)
  zone.items.filter(it=>it.type==='sub').forEach(subItem=>{
    const subEl=document.createElement('div');
    subEl.className='zone-item';
    subEl.style.background='#6b7280';
    subEl.style.color='#fff';
    subEl.style.fontWeight='700';
    subEl.style.textTransform='uppercase';
    subEl.style.fontSize='11px';
    subEl.dataset.itemId=subItem.id;
    subEl.draggable=true;
    subEl.textContent=subItem.name;
    
    const del=document.createElement('span');
    del.className='del-btn';
    del.textContent='✕';
    del.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=zone.items.findIndex(it=>it.id===subItem.id);
      if(idx>-1){
        poolItems.push(zone.items.splice(idx,1)[0]);
        renderPool();renderZones();
      }
    });
    subEl.appendChild(del);
    
    subEl.addEventListener('dragstart',e=>onZoneDragStart(e,zone.id,subItem));
    subEl.addEventListener('touchstart',e=>onTouchStart(e,'zone',zone.id,subItem),{passive:false});
    
    body.appendChild(subEl);
  });

  body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');showDropIndicator(body,e)});
  body.addEventListener('dragleave',()=>{body.classList.remove('drag-over');clearDropIndicators(body)});
  body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');clearDropIndicators(body);onDropInZone(zone.id,body,e)});

  container.appendChild(body);

  const delZ=document.createElement('div');
  delZ.style.cssText='position:absolute;top:2px;right:4px;cursor:pointer;font-size:10px;color:#000;opacity:.5';
  delZ.textContent='✕';
  delZ.addEventListener('click',()=>{
    zone.items.forEach(it=>poolItems.push(it));
    zones=zones.filter(z=>z.id!==zone.id);
    renderPool();
    renderZones();
  });
  container.appendChild(delZ);

  return container;
}

function createZoneItemElement(ni,zoneId){
  const el=document.createElement('div');
  el.className='zone-item';
  el.style.background=ni.color;
  el.dataset.itemId=ni.id;
  el.draggable=true;

  const num=document.createElement('span');
  num.className='num';
  num.textContent=ni.num;
  el.appendChild(num);

  const txt=document.createElement('span');
  txt.textContent=ni.name;
  txt.style.flex='1';
  el.appendChild(txt);

  const del=document.createElement('span');
  del.className='del-btn';
  del.textContent='✕';
  del.addEventListener('click',e=>{
    e.stopPropagation();
    const zone=zones.find(z=>z.id===zoneId);
    if(zone){
      const idx=zone.items.findIndex(it=>it.id===ni.id);
      if(idx>-1){
        poolItems.push(zone.items.splice(idx,1)[0]);
        renderPool();renderZones();
      }
    }
  });
  el.appendChild(del);

  el.addEventListener('dragstart',e=>onZoneDragStart(e,zoneId,ni));
  el.addEventListener('touchstart',e=>onTouchStart(e,'zone',zoneId,ni),{passive:false});
  el.addEventListener('dblclick',e=>openColorPicker(e,ni.id,zoneId));

  return el;
}

// standby rendering
function renderStandby(){
  const body=document.getElementById('standbyBody');
  body.innerHTML='';
  standbyItems.forEach(item=>{
    const el=document.createElement('div');
    el.className='zone-item';
    el.style.background=item.color;
    el.dataset.itemId=item.id;
    el.draggable=true;

    const txt=document.createElement('span');
    txt.textContent=item.name;
    txt.style.flex='1';
    el.appendChild(txt);

    const del=document.createElement('span');
    del.className='del-btn';
    del.textContent='✕';
    del.addEventListener('click',()=>{
      const idx=standbyItems.findIndex(s=>s.id===item.id);
      if(idx>-1){poolItems.push(standbyItems.splice(idx,1)[0]);renderPool();renderStandby();updateCounts()}
    });
    el.appendChild(del);

    el.addEventListener('dragstart',e=>{
      dragData={source:'standby',itemId:item.id,items:[item],selectedIds:new Set([item.id])};
      e.dataTransfer.effectAllowed='move';
    });

    body.appendChild(el);
  });
  updateCounts();
}

const standbyBody=document.getElementById('standbyBody');
standbyBody.addEventListener('dragover',e=>{e.preventDefault();standbyBody.classList.add('drag-over')});
standbyBody.addEventListener('dragleave',()=>standbyBody.classList.remove('drag-over'));
standbyBody.addEventListener('drop',e=>{
  e.preventDefault();
  standbyBody.classList.remove('drag-over');
  if(!dragData)return;
  const prevSelected=new Set(dragData.selectedIds);
  dragData.items.forEach(item=>{
    removeItemFromSource(item.id,dragData.source,dragData.zoneId);
    standbyItems.push(item);
  });
  dragData=null;
  selectedItems.clear();
  selectedItems.addAll=function(set){for(let v of set)this.add(v)};
  selectedItems.addAll(prevSelected);
  renderPool();renderZones();renderStandby();
  // Re-highlight selected items in standby
  document.querySelectorAll('.standby-body .zone-item').forEach(el=>{
    if(selectedItems.has(el.dataset.itemId)){
      el.classList.add('selected-highlight');
    }
  });
});

// ============ NUMBERING ============
function computeNumbering(items){
  const colorCount={};
  return items.map(item=>{
    if(!colorCount[item.color])colorCount[item.color]=0;
    colorCount[item.color]++;
    return{...item,num:colorCount[item.color]};
  });
}

// ============ DRAG HANDLERS ============
function onPoolDragStart(e,item){
  const items=selectedItems.has(item.id)?poolItems.filter(p=>selectedItems.has(p.id)):[item];
  dragData={source:'pool',itemId:item.id,items,selectedIds:new Set(items.map(i=>i.id))};
  e.dataTransfer.effectAllowed='move';
  // Keep selected items highlighted during drag
  e.dataTransfer.setDragImage(e.target,0,0);
}

function onZoneDragStart(e,zoneId,item){
  // Include all selected zone items if current item is selected
  let items=[item];
  if(selectedItems.has(item.id)){
    const zone=zones.find(z=>z.id===zoneId);
    if(zone){
      items=zone.items.filter(it=>selectedItems.has(it.id));
    }
  }
  dragData={source:'zone',zoneId,itemId:item.id,items,selectedIds:new Set(items.map(i=>i.id))};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setDragImage(e.target,0,0);
}

function removeItemFromSource(itemId,source,zoneId){
  if(source==='pool'){
    poolItems=poolItems.filter(p=>p.id!==itemId);
  }else if(source==='zone'&&zoneId){
    const zone=zones.find(z=>z.id===zoneId);
    if(zone)zone.items=zone.items.filter(it=>it.id!==itemId);
  }else if(source==='standby'){
    standbyItems=standbyItems.filter(s=>s.id!==itemId);
  }
}

function onDropInZone(zoneId,body,e){
  if(!dragData)return;
  const zone=zones.find(z=>z.id===zoneId);
  if(!zone)return;

  const dropIndex=getDropIndex(body,e.clientY);

  // Remove from source first
  dragData.items.forEach(item=>{
    removeItemFromSource(item.id,dragData.source,dragData.zoneId);
  });

  // Add to zone with preserved type
  dragData.items.forEach(item=>{
    zone.items.splice(dropIndex,0,{id:item.id,name:item.name,color:item.color,type:item.type});
  });
  
  // Keep selected items in their set and maintain highlighting after drop
  const prevSelected=new Set(dragData.selectedIds);
  dragData=null;
  selectedItems.clear();
  selectedItems.addAll=function(set){for(let v of set)this.add(v)};
  selectedItems.addAll(prevSelected);
  
  // Clear any lingering drag ghost elements
  document.querySelectorAll('.sortable-ghost').forEach(el=>el.remove());
  
  renderPool();renderZones();renderStandby();
  
  // Re-highlight selected items in their new location
  document.querySelectorAll('.zone-item, .pool-item').forEach(el=>{
    const id=el.dataset.itemId||el.dataset.id;
    if(selectedItems.has(id)){
      el.classList.add('selected-highlight');
    }
  });
}

function getDropIndex(body,clientY){
  const children=[...body.querySelectorAll('.zone-item')];
  for(let i=0;i<children.length;i++){
    const rect=children[i].getBoundingClientRect();
    if(clientY<rect.top+rect.height/2)return i;
  }
  return children.length;
}

const poolEl=document.getElementById('poolList');
poolEl.addEventListener('dragover',e=>e.preventDefault());
poolEl.addEventListener('drop',e=>{
  e.preventDefault();
  if(!dragData)return;
  const prevSelected=new Set(dragData.selectedIds);
  dragData.items.forEach(item=>{
    removeItemFromSource(item.id,dragData.source,dragData.zoneId);
    poolItems.push({id:item.id,name:item.name,color:item.color,type:item.type});
  });
  dragData=null;
  selectedItems.clear();
  selectedItems.addAll=function(set){for(let v of set)this.add(v)};
  selectedItems.addAll(prevSelected);
  renderPool();renderZones();renderStandby();
  // Re-highlight selected items in pool
  document.querySelectorAll('#poolList .pool-item').forEach(el=>{
    if(selectedItems.has(el.dataset.id)){
      el.classList.add('selected-highlight');
    }
  });
});

// ============ DROP INDICATORS ============
function showDropIndicator(body,e){
  clearDropIndicators(body);
  const children=[...body.querySelectorAll('.zone-item')];
  const idx=getDropIndex(body,e.clientY);
  const indicator=document.createElement('div');
  indicator.className='drop-indicator';
  if(children[idx])body.insertBefore(indicator,children[idx]);
  else body.appendChild(indicator);
}
function clearDropIndicators(body){
  body.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
}

// ============ TOUCH DRAG ============
let touchClone=null;
let touchStartX=0,touchStartY=0;

function onTouchStart(e,source,zoneId,item){
  if(e.touches.length!==1)return;
  const touch=e.touches[0];
  const target=e.currentTarget;

  let moved=false;
  touchStartX=touch.clientX;
  touchStartY=touch.clientY;

  function onMove(ev){
    ev.preventDefault();
    const t=ev.touches[0];
    const dx=Math.abs(t.clientX-touchStartX);
    const dy=Math.abs(t.clientY-touchStartY);
    
    if(!moved&&(dx+dy)<8)return;
    
    if(!moved){
      moved=true;
      // Include all selected items if current item is selected
      let items=[item];
      if(source==='zone'&&zoneId){
        const zone=zones.find(z=>z.id===zoneId);
        if(zone&&selectedItems.has(item.id)){
          items=zone.items.filter(it=>selectedItems.has(it.id));
        }
      }else if(source==='pool'&&selectedItems.has(item.id)){
        items=poolItems.filter(p=>selectedItems.has(p.id));
      }
      dragData={source,zoneId,itemId:item.id,items,selectedIds:new Set(items.map(i=>i.id))};
      touchClone=target.cloneNode(true);
      touchClone.style.cssText='position:fixed;z-index:10000;pointer-events:none;opacity:.8;transform:scale(1.05)';
      document.body.appendChild(touchClone);
    }
    
    // Only update position if clone exists
    if(touchClone){
      touchClone.style.left=(t.clientX-40)+'px';
      touchClone.style.top=(t.clientY-12)+'px';
    }
  }

  function onEnd(ev){
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    
    if(touchClone){
      touchClone.remove();
      touchClone=null;
    }
    
    if(!moved||!dragData)return;
    
    const t=ev.changedTouches[0];
    const dropEl=document.elementFromPoint(t.clientX,t.clientY);
    const prevSelected=new Set(dragData.selectedIds);
    if(dropEl){
      const zoneBody=dropEl.closest('.zone-body');
      const stBody=dropEl.closest('.standby-body');
      const poolArea=dropEl.closest('.scroll-pool');
      if(zoneBody){
        const zId=zoneBody.dataset.zoneId;
        const zone=zones.find(z=>z.id===zId);
        if(zone){
          const di=getDropIndex(zoneBody,t.clientY);
          dragData.items.forEach(it=>removeItemFromSource(it.id,dragData.source,dragData.zoneId));
          zone.items.splice(di,0,...dragData.items.map(it=>({id:it.id,name:it.name,color:it.color})));
        }
      }else if(stBody){
        dragData.items.forEach(it=>{removeItemFromSource(it.id,dragData.source,dragData.zoneId);standbyItems.push(it)});
      }else if(poolArea){
        dragData.items.forEach(it=>{removeItemFromSource(it.id,dragData.source,dragData.zoneId);poolItems.push(it)});
      }
    }
    dragData=null;
    selectedItems.clear();
    selectedItems.addAll=function(set){for(let v of set)this.add(v)};
    selectedItems.addAll(prevSelected);
    renderPool();renderZones();renderStandby();
    // Re-highlight selected items
    document.querySelectorAll('.zone-item, .pool-item, .standby-body .zone-item').forEach(el=>{
      const id=el.dataset.itemId||el.dataset.id;
      if(selectedItems.has(id)){
        el.classList.add('selected-highlight');
      }
    });
  }

  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

// ============ COLOR PICKER ============
function openColorPicker(e,itemId,zoneId){
  e.stopPropagation();
  const popup=document.getElementById('colorPicker');
  const grid=document.getElementById('swatchGrid');
  grid.innerHTML='';
  PICKER_COLORS.forEach(c=>{
    const s=document.createElement('div');
    s.className='swatch';
    s.style.background=c.hex;
    s.title=c.name;
    s.addEventListener('click',()=>{
      const zone=zones.find(z=>z.id===zoneId);
      if(zone){
        const item=zone.items.find(it=>it.id===itemId);
        if(item)item.color=c.hex;
      }
      popup.style.display='none';
      renderZones();
    });
    grid.appendChild(s);
  });
  popup.style.display='block';
  popup.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';
  popup.style.top=Math.min(e.clientY,window.innerHeight-100)+'px';
}

// ============ MARQUEE SELECTION ============
let marqueeActive=false,marqueeStart={x:0,y:0};
const marqueeBox=document.getElementById('marqueeBox');

document.addEventListener('mousedown',e=>{
  // Prevent marquee when clicking on interactive elements
  if(e.target.closest('.pool-item')||e.target.closest('.zone-item')||e.target.closest('input')||e.target.closest('button')||e.target.closest('select')||e.target.closest('textarea'))return;
  
  marqueeActive=true;
  marqueeStart={x:e.clientX,y:e.clientY};
  marqueeBox.style.display='block';
  marqueeBox.style.left=e.clientX+'px';
  marqueeBox.style.top=e.clientY+'px';
  marqueeBox.style.width='0';
  marqueeBox.style.height='0';
  selectedItems.clear();
  document.querySelectorAll('.selected-highlight').forEach(el=>el.classList.remove('selected-highlight'));
});

document.addEventListener('mousemove',e=>{
  if(!marqueeActive)return;
  
  const x=Math.min(e.clientX,marqueeStart.x);
  const y=Math.min(e.clientY,marqueeStart.y);
  const w=Math.abs(e.clientX-marqueeStart.x);
  const h=Math.abs(e.clientY-marqueeStart.y);
  
  marqueeBox.style.left=x+'px';
  marqueeBox.style.top=y+'px';
  marqueeBox.style.width=w+'px';
  marqueeBox.style.height=h+'px';

  const mRect={left:x,top:y,right:x+w,bottom:y+h};
  selectedItems.clear();
  
  // Select from pool
  document.querySelectorAll('#poolList .pool-item').forEach(el=>{
    const r=el.getBoundingClientRect();
    const overlap=!(r.right<mRect.left||r.left>mRect.right||r.bottom<mRect.top||r.top>mRect.bottom);
    if(overlap){
      selectedItems.add(el.dataset.id);
      el.classList.add('selected-highlight');
    }else{
      el.classList.remove('selected-highlight');
    }
  });
  
  // Select from zones
  document.querySelectorAll('.zone-item').forEach(el=>{
    const r=el.getBoundingClientRect();
    const overlap=!(r.right<mRect.left||r.left>mRect.right||r.bottom<mRect.top||r.top>mRect.bottom);
    if(overlap){
      selectedItems.add(el.dataset.itemId);
      el.classList.add('selected-highlight');
    }else{
      el.classList.remove('selected-highlight');
    }
  });
  
  // Select from standby
  document.querySelectorAll('.standby-body .zone-item').forEach(el=>{
    const r=el.getBoundingClientRect();
    const overlap=!(r.right<mRect.left||r.left>mRect.right||r.bottom<mRect.top||r.top>mRect.bottom);
    if(overlap){
      selectedItems.add(el.dataset.itemId);
      el.classList.add('selected-highlight');
    }else{
      el.classList.remove('selected-highlight');
    }
  });
});

document.addEventListener('mouseup',()=>{
  if(marqueeActive){
    marqueeActive=false;
    marqueeBox.style.display='none';
  }
});
