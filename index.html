  <style>
html, body { height: 100%; margin: 0; overflow: hidden; }
* { box-sizing: border-box; }
.app-root { height: 100%; overflow: hidden; background: #0a0e1a; }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

/* DND */
.dragging { opacity: 0.4; transform: scale(0.95); }
.drag-over { background: rgba(59,130,246,0.15) !important; border: 2px dashed #3b82f6 !important; }
.name-chip { cursor: grab; user-select: none; transition: all 0.15s ease; }
.name-chip:active { cursor: grabbing; }
.name-chip.selected { ring: 2px; outline: 2px solid #60a5fa; outline-offset: 1px; }
.name-chip:hover { filter: brightness(1.1); transform: translateY(-1px); }

/* Color classes */
.chip-blue { background: #3b82f6; color: #fff; }
.chip-yellow { background: #eab308; color: #1a1a1a; }
.chip-orange { background: #f97316; color: #fff; }
.chip-red { background: #ef4444; color: #fff; }
.chip-grey { background: #6b7280; color: #fff; }
.chip-green { background: #22c55e; color: #fff; }
.chip-pink { background: #ec4899; color: #fff; }

/* A4 Canvas */
.a4-canvas {
  width: 794px; min-height: 1123px; background: #fff;
  font-family: 'Source Sans 3', sans-serif;
  position: relative;
}

/* Zone grid */
.zone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px; }
.zone-wrapper { break-inside: avoid; }

/* Editable fields */
.editable-field { border: none; outline: none; background: transparent; }
.editable-field:focus { background: rgba(0,0,0,0.05); border-radius: 2px; }

/* Color picker popup */
.color-picker-popup {
  position: fixed; z-index: 9999; background: #1e293b;
  border-radius: 8px; padding: 8px; display: flex; gap: 6px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.color-dot {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s;
}
.color-dot:hover { transform: scale(1.2); border-color: #fff; }

/* Print-safe */
@media print { .no-print { display: none !important; } }

/* Touch helpers */
@media (pointer: coarse) {
  .name-chip { padding: 6px 10px !important; min-height: 36px; }
}

/* Standby table */
.standby-container { border: 2px solid #374151; background: #f9fafb; }
</style>

  <script>
// ===== STATE =====
const COLOR_ORDER = ['blue','yellow','orange','red','green','pink','grey'];
const COLOR_CLASSES = {blue:'chip-blue',yellow:'chip-yellow',orange:'chip-orange',red:'chip-red',grey:'chip-grey',green:'chip-green',pink:'chip-pink'};

let nextId = 1;
function mkWorker(name, color) { return { id: nextId++, name, color }; }

const initialWorkers = [
  ...['Fredy Chidotz','Deni Sandy','Hamdan','Iman Udeng','Pingki Sopian'].map(n=>mkWorker(n,'blue')),
  ...['Adi Susanto','Alif','Ikhwani','Yudi','Fahmi','Aditya Arisandi','Kikin','Samsul Hidayat'].map(n=>mkWorker(n,'yellow')),
  ...['Supriyadi','Hendri','Basori','Acep','Edi','Sudarmansyah','Ryan Hermawan','Iwan A. Setiawan'].map(n=>mkWorker(n,'orange')),
  ...['Heri Suherman','Ismail','Rahmat','Rendi','Dafa','Anggi Yanuar','Caryana','Pryambudi','Asep A. Setiawan','Sandi Permana','Aditiya A. Aziz','Wawan Kurniawan','Rizki N. Huda','M. Dian Saputra'].map(n=>mkWorker(n,'red'))
];

let pool = [...initialWorkers];
let zones = [];
let standbyWorkers = [];
let zoneIdCounter = 0;
let selectedIds = new Set();
let dragData = null;
let colorPickerTarget = null;

// ===== ADVANCED DND STATE =====
let activeDragSource = null;
let activeDragWorkerIds = [];
let dragStartPos = { x: 0, y: 0 };
let selectionRect = null;
let isDrawingSelectionRect = false;
let lastHoveredDropZone = null;

function newZone(headerText, titleText, subText) {
  return { id: ++zoneIdCounter, header: headerText||'ZONE '+zoneIdCounter, title: titleText||'UNIT '+zoneIdCounter, sub: subText||'Subtitle', workers: [] };
}

// Add 2 default zones
zones.push(newZone('ZONE A','UNIT A','Sub-Unit A'));
zones.push(newZone('ZONE B','UNIT B','Sub-Unit B'));

// ===== RENDER =====
function render() {
  renderPool();
  renderCanvas();
  renderZonePanel();
  updateTotals();
}

function renderPool() {
  const c = document.getElementById('pool-list');
  const existing = new Map([...c.children].map(el=>[el.dataset.workerId, el]));
  const currentIds = new Set(pool.map(w=>String(w.id)));

  // Remove workers no longer in pool
  existing.forEach((el, id) => { if (!currentIds.has(id)) el.remove(); });

  pool.forEach((w, i) => {
    let el = existing.get(String(w.id));
    if (!el) {
      el = document.createElement('div');
      el.dataset.workerId = String(w.id);
      el.className = `name-chip ${COLOR_CLASSES[w.color]} rounded px-3 py-1.5 text-xs font-semibold flex items-center gap-1`;
      el.draggable = true;
      el.textContent = w.name;
      el.addEventListener('dragstart', onPointerDragStart);
      el.addEventListener('dragend', onPointerDragEnd);
      el.addEventListener('pointerdown', onPoolPointerDown);
      el.addEventListener('click', onPoolClick);
    }
    // Update selection state
    el.classList.toggle('selected', selectedIds.has(w.id));
    // Ensure correct position
    if (c.children[i] !== el) {
      if (c.children[i]) c.insertBefore(el, c.children[i]);
      else c.appendChild(el);
    }
  });

  document.getElementById('pool-count').textContent = pool.length + ' workers available';
  
  // Setup selection rect on pool
  setupSelectionRect(c);
}

function renderCanvas() {
  const grid = document.getElementById('zone-grid');
  const existingZones = new Map([...grid.children].map(el=>[el.dataset.zoneId, el]));
  const currentZoneIds = new Set(zones.map(z=>String(z.id)));

  existingZones.forEach((el, id) => { if (!currentZoneIds.has(id)) el.remove(); });

  zones.forEach((zone, zi) => {
    let wrapper = existingZones.get(String(zone.id));
    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.dataset.zoneId = String(zone.id);
      wrapper.className = 'zone-wrapper';
      wrapper.innerHTML = buildZoneHTML(zone);
      setupZoneEvents(wrapper, zone);
    } else {
      updateZoneWorkers(wrapper, zone);
    }
    if (grid.children[zi] !== wrapper) {
      if (grid.children[zi]) grid.insertBefore(wrapper, grid.children[zi]);
      else grid.appendChild(wrapper);
    }
  });

  // Standby
  renderStandby();
}

function buildZoneHTML(zone) {
  return `
    <div class="text-xs font-bold text-gray-400 mb-0.5 px-1 editable-field" contenteditable="true" data-field="header">${zone.header}</div>
    <div class="border border-gray-300 rounded bg-white p-1.5 min-h-[60px]" data-drop="zone-${zone.id}">
      <div class="text-sm font-bold text-blue-600 editable-field text-center" contenteditable="true" data-field="title">${zone.title}</div>
      <div class="text-xs font-bold text-red-500 italic editable-field text-center" contenteditable="true" data-field="sub">${zone.sub}</div>
      <div class="worker-list mt-1 space-y-0.5 min-h-[20px]"></div>
      <button class="remove-zone-btn text-[9px] text-gray-300 hover:text-red-400 mt-1 transition-colors" title="Remove zone">✕ remove</button>
    </div>`;
}

function setupZoneEvents(wrapper, zone) {
  const dropArea = wrapper.querySelector('[data-drop]');
  dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
  dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
  dropArea.addEventListener('drop', e => { e.preventDefault(); dropArea.classList.remove('drag-over'); onDropInZone(zone.id); });

  // Touch drop zone
  dropArea.dataset.zoneDropId = zone.id;

  // Editable fields
  wrapper.querySelector('[data-field="header"]').addEventListener('blur', function(){ zone.header = this.textContent; });
  wrapper.querySelector('[data-field="title"]').addEventListener('blur', function(){ zone.title = this.textContent; });
  wrapper.querySelector('[data-field="sub"]').addEventListener('blur', function(){ zone.sub = this.textContent; });

  // Remove zone btn
  wrapper.querySelector('.remove-zone-btn').addEventListener('click', () => {
    pool.push(...zone.workers);
    zones = zones.filter(z=>z.id!==zone.id);
    render();
  });
  
  // Selection rect on zone workers
  setupSelectionRect(wrapper.querySelector('.worker-list'));
}

function getNumberedWorkers(workers) {
  // Group by color, maintain order, number within each group
  const groups = [];
  let currentColor = null;
  let num = 0;
  // Sort by color order first, preserve insertion order within same color
  const sorted = [...workers].sort((a,b) => {
    const ai = COLOR_ORDER.indexOf(a.color); const bi = COLOR_ORDER.indexOf(b.color);
    if (ai !== bi) return ai - bi;
    return workers.indexOf(a) - workers.indexOf(b);
  });
  sorted.forEach(w => {
    if (w.color !== currentColor) { currentColor = w.color; num = 1; }
    else num++;
    groups.push({ ...w, num });
  });
  return groups;
}

function updateZoneWorkers(wrapper, zone) {
  const list = wrapper.querySelector('.worker-list');
  const numbered = getNumberedWorkers(zone.workers);
  const existing = new Map([...list.children].map(el=>[el.dataset.workerId, el]));
  const currentIds = new Set(numbered.map(w=>String(w.id)));

  existing.forEach((el, id) => { if (!currentIds.has(id)) el.remove(); });

  numbered.forEach((w, i) => {
    let el = existing.get(String(w.id));
    if (!el) {
      el = document.createElement('div');
      el.dataset.workerId = String(w.id);
      el.draggable = true;
      el.addEventListener('dragstart', (e) => onPointerDragStart.call(el, e, zone.id));
      el.addEventListener('dragend', onPointerDragEnd);
      el.addEventListener('dblclick', (e) => openColorPicker(e, w.id, zone.id));
      el.addEventListener('pointerdown', (e) => onCanvasPointerDown.call(el, e, zone.id));
    }
    el.className = `name-chip ${COLOR_CLASSES[w.color]} rounded px-2 py-0.5 text-[10px] font-semibold`;
    el.textContent = `${w.num}. ${w.name}`;
    if (list.children[i] !== el) {
      if (list.children[i]) list.insertBefore(el, list.children[i]);
      else list.appendChild(el);
    }
  });
}

function renderStandby() {
  const c = document.getElementById('standby-zone');
  const numbered = getNumberedWorkers(standbyWorkers);
  const existing = new Map([...c.children].map(el=>[el.dataset.workerId, el]));
  const currentIds = new Set(numbered.map(w=>String(w.id)));

  existing.forEach((el, id) => { if (!currentIds.has(id)) el.remove(); });

  numbered.forEach((w, i) => {
    let el = existing.get(String(w.id));
    if (!el) {
      el = document.createElement('div');
      el.dataset.workerId = String(w.id);
      el.draggable = true;
      el.addEventListener('dragstart', (e) => onPointerDragStart.call(el, e, 'standby'));
      el.addEventListener('dragend', onPointerDragEnd);
      el.addEventListener('dblclick', (e) => openColorPicker(e, w.id, 'standby'));
      el.addEventListener('pointerdown', (e) => onStandbyPointerDown.call(el, e));
    }
    el.className = `name-chip ${COLOR_CLASSES[w.color]} rounded px-2 py-0.5 text-[10px] font-semibold`;
    el.textContent = `${w.num}. ${w.name}`;
    if (c.children[i] !== el) {
      if (c.children[i]) c.insertBefore(el, c.children[i]);
      else c.appendChild(el);
    }
  });

  // Setup drop on standby
  c.ondragover = (e) => { e.preventDefault(); c.classList.add('drag-over'); };
  c.ondragleave = () => c.classList.remove('drag-over');
  c.ondrop = (e) => { e.preventDefault(); c.classList.remove('drag-over'); onDropInStandby(); };
}

function renderZonePanel() {
  const panel = document.getElementById('zone-list-panel');
  panel.innerHTML = zones.map(z =>
    `<div class="flex items-center justify-between text-xs text-white/70 bg-white/5 rounded px-2 py-1.5">
      <span>${z.header} (${z.workers.length})</span>
    </div>`
  ).join('') + `<div class="text-xs text-white/40 mt-1">Standby: ${standbyWorkers.length}</div>`;
}

function updateTotals() {
  const totalWorkers = zones.reduce((s,z)=>s+z.workers.length, 0);
  document.getElementById('total-pekerja').textContent = totalWorkers;
  document.getElementById('total-standby').textContent = standbyWorkers.length;
}

// ===== ADVANCED DRAG & DROP =====

// Selection Rectangle Logic
function setupSelectionRect(container) {
  if (!container) return;
  let isSelecting = false;
  let startX, startY;
  let rectElement = null;
  
  const isDropZone = container.classList.contains('worker-list') || container.id === 'pool-list';
  if (!isDropZone) return;

  container.addEventListener('pointerdown', (e) => {
    // Only activate on empty space (not on name-chip)
    if (e.target.closest('.name-chip')) return;
    
    isSelecting = true;
    startX = e.clientX;
    startY = e.clientY;
    
    // Create selection rectangle visual
    rectElement = document.createElement('div');
    rectElement.style.position = 'fixed';
    rectElement.style.border = '2px dashed #3b82f6';
    rectElement.style.background = 'rgba(59, 130, 246, 0.1)';
    rectElement.style.pointerEvents = 'none';
    rectElement.style.zIndex = '9998';
    document.body.appendChild(rectElement);
  });

  document.addEventListener('pointermove', (e) => {
    if (!isSelecting || !rectElement) return;
    
    const currentX = e.clientX;
    const currentY = e.clientY;
    const left = Math.min(startX, currentX);
    const top = Math.min(startY, currentY);
    const width = Math.abs(currentX - startX);
    const height = Math.abs(currentY - startY);
    
    rectElement.style.left = left + 'px';
    rectElement.style.top = top + 'px';
    rectElement.style.width = width + 'px';
    rectElement.style.height = height + 'px';
    
    // Collision detection: find all chips that intersect rect
    const chips = container.querySelectorAll('.name-chip');
    const rectBounds = { left, top, right: left + width, bottom: top + height };
    
    selectedIds.clear();
    chips.forEach(chip => {
      const chipBounds = chip.getBoundingClientRect();
      if (rectsIntersect(rectBounds, { left: chipBounds.left, top: chipBounds.top, right: chipBounds.right, bottom: chipBounds.bottom })) {
        const wid = parseInt(chip.dataset.workerId);
        selectedIds.add(wid);
      }
    });
    
    renderPool();
  });

  document.addEventListener('pointerup', (e) => {
    if (isSelecting && rectElement) {
      rectElement.remove();
      rectElement = null;
      isSelecting = false;
    }
  });
}

function rectsIntersect(r1, r2) {
  return !(r2.right < r1.left || r2.left > r1.right || r2.bottom < r1.top || r2.top > r1.bottom);
}

function onPointerDragStart(e, sourceZoneId) {
  const wid = parseInt(e.currentTarget.dataset.workerId);
  const source = e.currentTarget.closest('#pool-list') ? 'pool' :
                 e.currentTarget.closest('#standby-zone') ? 'standby' : 'zone';
  
  let ids = selectedIds.size > 0 && selectedIds.has(wid) ? [...selectedIds] : [wid];
  
  activeDragSource = source;
  activeDragWorkerIds = ids;
  
  dragData = source === 'pool' 
    ? { source: 'pool', workerIds: ids }
    : source === 'standby'
    ? { source: 'standby', workerIds: ids }
    : { source: 'zone', sourceZoneId, workerIds: ids };
  
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onPointerDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  activeDragSource = null;
  activeDragWorkerIds = [];
}

function onPoolPointerDown(e) {
  if (e.button !== 0) return; // Only left-click
  
  const wid = parseInt(e.currentTarget.dataset.workerId);
  const isMultiSelect = e.ctrlKey || e.metaKey;
  const isRangeSelect = e.shiftKey;
  
  if (isMultiSelect) {
    if (selectedIds.has(wid)) selectedIds.delete(wid);
    else selectedIds.add(wid);
  } else if (isRangeSelect) {
    // Simple range select: just add to selection
    selectedIds.add(wid);
  } else {
    // Single click
    if (selectedIds.has(wid) && selectedIds.size === 1) selectedIds.clear();
    else { selectedIds.clear(); selectedIds.add(wid); }
  }
  
  renderPool();
}

function onCanvasPointerDown(e, zoneId) {
  if (e.button !== 0) return;
  const wid = parseInt(e.currentTarget.dataset.workerId);
  
  // For canvas zones, only single select initially (multi-select via lasso)
  if (selectedIds.has(wid) && selectedIds.size === 1) selectedIds.clear();
  else { selectedIds.clear(); selectedIds.add(wid); }
}

function onStandbyPointerDown(e) {
  if (e.button !== 0) return;
  const wid = parseInt(e.currentTarget.dataset.workerId);
  
  if (selectedIds.has(wid) && selectedIds.size === 1) selectedIds.clear();
  else { selectedIds.clear(); selectedIds.add(wid); }
}

function onPoolClick(e) {
  // Click handling is now in onPoolPointerDown
}

function onDropInZone(zoneId) {
  if (!dragData) return;
  const zone = zones.find(z=>z.id===zoneId);
  if (!zone) return;

  const workers = [];
  dragData.workerIds.forEach(id => {
    let w = null;
    if (dragData.source === 'pool') {
      const idx = pool.findIndex(p=>p.id===id);
      if (idx > -1) { w = pool.splice(idx, 1)[0]; }
    } else if (dragData.source === 'zone') {
      const srcZone = zones.find(z=>z.id===dragData.sourceZoneId);
      if (srcZone) { const idx = srcZone.workers.findIndex(p=>p.id===id); if (idx>-1) w = srcZone.workers.splice(idx,1)[0]; }
    } else if (dragData.source === 'standby') {
      const idx = standbyWorkers.findIndex(p=>p.id===id);
      if (idx>-1) w = standbyWorkers.splice(idx,1)[0];
    }
    if (w) workers.push(w);
  });

  zone.workers.push(...workers);
  selectedIds.clear();
  dragData = null;
  render();
}

function onDropInStandby() {
  if (!dragData) return;
  const workers = [];
  dragData.workerIds.forEach(id => {
    let w = null;
    if (dragData.source === 'pool') {
      const idx = pool.findIndex(p=>p.id===id);
      if (idx > -1) w = pool.splice(idx, 1)[0];
    } else if (dragData.source === 'zone') {
      const srcZone = zones.find(z=>z.id===dragData.sourceZoneId);
      if (srcZone) { const idx = srcZone.workers.findIndex(p=>p.id===id); if (idx>-1) w = srcZone.workers.splice(idx,1)[0]; }
    } else if (dragData.source === 'standby') {
      return; // Already in standby
    }
    if (w) workers.push(w);
  });
  standbyWorkers.push(...workers);
  selectedIds.clear();
  dragData = null;
  render();
}

// ===== COLOR PICKER =====
function openColorPicker(e, workerId, zoneIdOrStandby) {
  e.preventDefault(); e.stopPropagation();
  const picker = document.getElementById('color-picker');
  picker.style.display = 'flex';
  picker.style.left = e.clientX + 'px';
  picker.style.top = (e.clientY - 40) + 'px';
  colorPickerTarget = { workerId, zone: zoneIdOrStandby };
}

document.querySelectorAll('#color-picker .color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    if (!colorPickerTarget) return;
    const color = dot.dataset.color;
    const { workerId, zone } = colorPickerTarget;

    if (zone === 'standby') {
      const w = standbyWorkers.find(w=>w.id===workerId);
      if (w) w.color = color;
    } else {
      const z = zones.find(z=>z.id===zone);
      if (z) { const w = z.workers.find(w=>w.id===workerId); if (w) w.color = color; }
    }

    document.getElementById('color-picker').style.display = 'none';
    colorPickerTarget = null;
    render();
  });
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('#color-picker') && !e.target.closest('.name-chip')) {
    document.getElementById('color-picker').style.display = 'none';
  }
});

document.getElementById('download-btn').addEventListener('click', () => {

    const link = document.createElement('a');

});

function applyConfig(config) {

  document.getElementById('canvas-title').textContent = c.canvas_title;

  document.querySelector('.app-root').style.background = c.background_color;

      ],

    }),

      ['canvas_title', config.canvas_title || defaultConfig.canvas_title],
      ['day_label', config.day_label || defaultConfig.day_label]
    ])
  });
}
