  <script>
// Color palette - BOLD colors
const colorOptions = {
  merah: '#ee0000',
  kuning: '#ffbb00',
  oren: '#ff6600',
  biru: '#0055ff',
  pink: '#ff1177',
  hijau: '#00aa44'
};

const colorNames = {
  '#ef4444': 'merah',
  '#eab308': 'kuning',
  '#f97316': 'oren',
  '#3b82f6': 'biru',
  '#ec4899': 'pink',
  '#10b981': 'hijau'
};

// State management
let draggableLists = [
  { id: 'pool', name: 'Pool List', color: '#ca8a04', visible: true, items: ['Andi Pratama','Budi Santoso','Rizky Aditya','Fajar Hidayat','Arief Rahman','Dimas Permana','Hendra Wijaya','Irfan Harahap','Joko Supriyanto','Kris Mahendra','Leo Gunawan','Maman Sutrisna','Nendra Kusuma','Okta Riyanto','Pandu Wirawan','Qori Hidayatullah','Rafi Syafaat','Satrio Yudhanto','Teguh Santoso','Ulul Azmi'] }
];

let dropZones = [
  { id: 'workshop', name: 'Workshop', color: '#f59e0b', visible: true },
  { id: 'syuting', name: 'Set Syuting', color: '#10b981', visible: true },
  { id: 'bond', name: 'Bond', color: '#3b82f6', visible: true }
];

let selectedCards = new Set();
let dragSource = null;
let isDraggingMultiple = false;
let cardColors = {}; // Store custom colors for each card

function createCard(name, zone) {
  const div = document.createElement('div');
  div.className = 'name-card';
  div.setAttribute('data-name', name);
  div.setAttribute('data-zone', zone);
  
  // Use custom color if exists, otherwise use zone color
  const customColor = cardColors[name];
  const color = customColor || getZoneColor(zone);
  
  div.style.cssText = `background:${color}; border-color:${color}; color:#fff; display: flex; align-items: center; justify-content: space-between;`;
  div.setAttribute('data-color', color);
  
  const nameSpan = document.createElement('span');
  nameSpan.textContent = name;
  nameSpan.style.flex = '1';
  
  const editBtn = document.createElement('button');
  editBtn.innerHTML = '✎';
  editBtn.style.cssText = 'background: none; border: none; cursor: pointer; font-size: 12px; opacity: 0.6; padding: 0 4px; transition: opacity 0.2s;';
  editBtn.addEventListener('mouseenter', () => editBtn.style.opacity = '1');
  editBtn.addEventListener('mouseleave', () => editBtn.style.opacity = '0.6');
  editBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    e.preventDefault();
    editCardName(div, nameSpan, name);
  });
  
  div.appendChild(nameSpan);
  div.appendChild(editBtn);
  
  div.addEventListener('mousedown', (e) => {
    if (e.button === 0 && !e.target.closest('button')) {
      startCardDrag(e, div);
    }
  }, false);
  div.addEventListener('touchstart', (e) => handleCardTouchStart(e, div), false);
  
  return div;
}

function editCardName(card, nameSpan, oldName) {
  const input = document.createElement('input');
  input.type = 'text';
  input.value = oldName;
  input.style.cssText = 'padding: 4px 6px; border: 1px solid #999; border-radius: 4px; font-size: 11px; width: 80px;';
  
  const saveEdit = () => {
    const newName = input.value.trim() || oldName;
    nameSpan.textContent = newName;
    card.setAttribute('data-name', newName);
    const zone = card.getAttribute('data-zone');
    if (zone === 'pool') {
      const pool = draggableLists.find(l => l.id === 'pool');
      if (pool) {
        const idx = pool.items.indexOf(oldName);
        if (idx >= 0) pool.items[idx] = newName;
      }
    }
    // Transfer custom color to new name
    if (cardColors[oldName]) {
      cardColors[newName] = cardColors[oldName];
      delete cardColors[oldName];
    }
    card.replaceChild(nameSpan, input);
  };
  
  card.replaceChild(input, nameSpan);
  input.focus();
  input.select();
  
  input.addEventListener('blur', saveEdit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveEdit();
    if (e.key === 'Escape') {
      nameSpan.textContent = oldName;
      card.replaceChild(nameSpan, input);
    }
  });
}

function showColorPicker(cardName, cardElement) {
  // Remove existing backdrop if any
  const existingBackdrop = document.querySelector('.color-picker-backdrop');
  if (existingBackdrop) existingBackdrop.remove();
  
  const backdrop = document.createElement('div');
  backdrop.className = 'color-picker-backdrop';
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) {
      backdrop.remove();
    }
  });
  
  const modal = document.createElement('div');
  modal.className = 'color-picker-modal';
  
  const title = document.createElement('div');
  title.style.cssText = 'font-size: 14px; font-weight: 600; margin-bottom: 8px;';
  title.textContent = `Pilih warna untuk: ${cardName}`;
  
  const colorGrid = document.createElement('div');
  colorGrid.className = 'color-grid';
  
  const currentColor = cardColors[cardName] || cardElement.getAttribute('data-color');
  
  Object.entries(colorOptions).forEach(([name, hex]) => {
    const colorOption = document.createElement('button');
    colorOption.className = 'color-option';
    colorOption.style.background = hex;
    if (currentColor === hex) {
      colorOption.classList.add('selected');
    }
    colorOption.addEventListener('click', () => {
      cardColors[cardName] = hex;
      cardElement.style.cssText = `background:${hex}; border-color:${hex}; color:#fff; display: flex; align-items: center; justify-content: space-between;`;
      cardElement.setAttribute('data-color', hex);
      backdrop.remove();
    });
    colorGrid.appendChild(colorOption);
  });
  
  modal.appendChild(title);
  modal.appendChild(colorGrid);
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
}

function getZoneColor(zoneId) {
  const pool = draggableLists.find(l => l.id === zoneId);
  if (pool) return pool.color;
  
  const zone = dropZones.find(z => z.id === zoneId);
  return zone ? zone.color : '#a78bfa';
}

function handleSelectionBox(e, zoneContainer) {
  // Jangan jalankan jika click pada card atau button
  if (e.target.closest('.name-card') || e.target.closest('button') || e.target.tagName === 'INPUT') {
    return;
  }
  
  if (e.button !== 0) return;
  
  e.preventDefault();
  e.stopPropagation();
  
  const startX = e.clientX;
  const startY = e.clientY;
  let isSelecting = false;
  let selectionBox = null;
  
  const moveListener = (moveE) => {
    const dx = Math.abs(moveE.clientX - startX);
    const dy = Math.abs(moveE.clientY - startY);
    
    // Start selection after moving minimum 5px
    if (!isSelecting && (dx > 5 || dy > 5)) {
      isSelecting = true;
      // Clear previous selection
      selectedCards.forEach(c => c.classList.remove('selected'));
      selectedCards.clear();
    }
    
    if (isSelecting) {
      const x1 = Math.min(startX, moveE.clientX);
      const y1 = Math.min(startY, moveE.clientY);
      const x2 = Math.max(startX, moveE.clientX);
      const y2 = Math.max(startY, moveE.clientY);
      
      if (!selectionBox) {
        selectionBox = document.createElement('div');
        selectionBox.className = 'selection-box';
        document.body.appendChild(selectionBox);
      }
      
      selectionBox.style.left = x1 + 'px';
      selectionBox.style.top = y1 + 'px';
      selectionBox.style.width = (x2 - x1) + 'px';
      selectionBox.style.height = (y2 - y1) + 'px';
      
      // Select all cards within selection box
      const allCards = zoneContainer.querySelectorAll('.name-card');
      allCards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const isInside = (rect.left < x2 && rect.right > x1 && rect.top < y2 && rect.bottom > y1);
        
        if (isInside) {
          if (!selectedCards.has(card)) {
            selectedCards.add(card);
            card.classList.add('selected');
          }
        } else {
          if (selectedCards.has(card)) {
            selectedCards.delete(card);
            card.classList.remove('selected');
          }
        }
      });
    }
  };
  
  const upListener = () => {
    document.removeEventListener('mousemove', moveListener);
    document.removeEventListener('mouseup', upListener);
    if (selectionBox) {
      selectionBox.remove();
    }
  };
  
  document.addEventListener('mousemove', moveListener);
  document.addEventListener('mouseup', upListener);
}

function startCardDrag(e, card) {
  if (e.button !== 0) return;
  if (e.target.closest('button')) return;
  
  e.stopPropagation();
  
  let hasMoved = false;
  const startX = e.clientX;
  const startY = e.clientY;
  
  const draggedCards = Array.from(selectedCards);
  if (!draggedCards.includes(card)) {
    if (!e.ctrlKey && !e.metaKey && !e.shiftKey) {
      selectedCards.forEach(c => c.classList.remove('selected'));
      selectedCards.clear();
    }
    draggedCards.length = 0;
    draggedCards.push(card);
    selectedCards.add(card);
    card.classList.add('selected');
  }
  
  const originalParents = new Map(draggedCards.map(c => [c, c.parentElement]));
  
  const moveListener = (moveE) => {
    const dx = Math.abs(moveE.clientX - startX);
    const dy = Math.abs(moveE.clientY - startY);
    
    if (dx > 5 || dy > 5) {
      hasMoved = true;
    }
    
    if (hasMoved) {
      draggedCards.forEach((c, idx) => {
        if (!c.classList.contains('dragging')) {
          c.classList.add('dragging', 'dragging-ghost');
          document.body.appendChild(c);
        }
        if (idx === 0) {
          c.style.left = (moveE.clientX - 50) + 'px';
          c.style.top = (moveE.clientY - 15) + 'px';
        } else {
          c.style.left = (moveE.clientX - 50) + 'px';
          c.style.top = (moveE.clientY - 15 + idx * 28) + 'px';
        }
      });
    }
  };
  
  const upListener = (upE) => {
    document.removeEventListener('mousemove', moveListener);
    document.removeEventListener('mouseup', upListener);
    
    if (!hasMoved) {
      const name = card.getAttribute('data-name');
      showColorPicker(name, card);
      return;
    }
    
    if (draggedCards.length > 0) {
      const targetZone = getTargetZone(upE.clientX, upE.clientY);
      if (targetZone) {
        const targetContainer = document.getElementById(targetZone);
        draggedCards.forEach(c => {
          c.classList.remove('dragging');
          c.style.position = '';
          c.style.left = '';
          c.style.top = '';
          c.style.zIndex = '';
          targetContainer.appendChild(c);
          c.setAttribute('data-zone', targetZone);
          const color = getZoneColor(targetZone);
          c.style.cssText = `background:${color}; border-color:${color}; color:#fff; display: flex; align-items: center; justify-content: space-between;`;
          c.classList.remove('dragging-ghost');
        });
        updateCounts();
      } else {
        draggedCards.forEach(c => {
          c.classList.remove('dragging', 'dragging-ghost');
          c.style.position = '';
          c.style.left = '';
          c.style.top = '';
          c.style.zIndex = '';
          const originalParent = originalParents.get(c);
          if (originalParent) {
            originalParent.appendChild(c);
          }
        });
      }
    }
  };
  
  document.addEventListener('mousemove', moveListener);
  document.addEventListener('mouseup', upListener);
}

function handleCardTouchStart(e, card) {
  e.preventDefault();
  if (!selectedCards.has(card)) {
    selectedCards.forEach(c => c.classList.remove('selected'));
    selectedCards.clear();
    selectedCards.add(card);
    card.classList.add('selected');
  }
  
  dragSource = card;
  isDraggingMultiple = selectedCards.size > 1;
  
  const draggedCards = Array.from(selectedCards);
  const originalParents = new Map(draggedCards.map(c => [c, c.parentElement]));
  
  const moveListener = (moveE) => {
    const touch = moveE.touches[0];
    draggedCards.forEach((c, idx) => {
      if (!c.classList.contains('dragging')) {
        c.classList.add('dragging', 'dragging-ghost');
        document.body.appendChild(c);
      }
      if (idx === 0) {
        c.style.left = (touch.clientX - 50) + 'px';
        c.style.top = (touch.clientY - 15) + 'px';
      } else {
        c.style.left = (touch.clientX - 50) + 'px';
        c.style.top = (touch.clientY - 15 + idx * 28) + 'px';
      }
    });
  };
  
  const endListener = (endE) => {
    document.removeEventListener('touchmove', moveListener, false);
    document.removeEventListener('touchend', endListener, false);
    
    const touch = endE.changedTouches[0];
    if (dragSource && selectedCards.size > 0) {
      const targetZone = getTargetZone(touch.clientX, touch.clientY);
      if (targetZone) {
        const targetContainer = document.getElementById(targetZone);
        draggedCards.forEach(card => {
          card.classList.remove('dragging');
          card.style.position = '';
          card.style.left = '';
          card.style.top = '';
          card.style.zIndex = '';
          targetContainer.appendChild(card);
          card.setAttribute('data-zone', targetZone);
          const color = getZoneColor(targetZone);
          card.style.cssText = `background:${color}; border-color:${color}; color:#fff; display: flex; align-items: center; justify-content: space-between;`;
          card.classList.remove('dragging-ghost');
        });
        updateCounts();
      } else {
        draggedCards.forEach(c => {
          c.classList.remove('dragging', 'dragging-ghost');
          c.style.position = '';
          c.style.left = '';
          c.style.top = '';
          c.style.zIndex = '';
          const originalParent = originalParents.get(c);
          if (originalParent) {
            originalParent.appendChild(c);
          }
        });
      }
    }
  };
  
  document.addEventListener('touchmove', moveListener, false);
  document.addEventListener('touchend', endListener, false);
  dragSource = null;
  isDraggingMultiple = false;
}

function handleCardClick(e, card) {
  if (e.button !== 0) return;
  if (e.target.closest('button')) return;
  
  e.stopPropagation();
  
  let hasMoved = false;
  const startX = e.clientX;
  const startY = e.clientY;
  
  const draggedCards = [card];
  if (!selectedCards.has(card)) {
    selectedCards.forEach(c => c.classList.remove('selected'));
    selectedCards.clear();
    selectedCards.add(card);
    card.classList.add('selected');
  }
  
  const originalParents = new Map(draggedCards.map(c => [c, c.parentElement]));
  
  const moveListener = (moveE) => {
    const dx = Math.abs(moveE.clientX - startX);
    const dy = Math.abs(moveE.clientY - startY);
    
    if (dx > 5 || dy > 5) {
      hasMoved = true;
    }
    
    if (hasMoved) {
      draggedCards.forEach((c) => {
        if (!c.classList.contains('dragging')) {
          c.classList.add('dragging', 'dragging-ghost');
          document.body.appendChild(c);
        }
        c.style.left = (moveE.clientX - 50) + 'px';
        c.style.top = (moveE.clientY - 15) + 'px';
      });
    }
  };
  
  const upListener = (upE) => {
    document.removeEventListener('mousemove', moveListener);
    document.removeEventListener('mouseup', upListener);
    
    if (!hasMoved) {
      const name = card.getAttribute('data-name');
      showColorPicker(name, card);
      return;
    }
    
    if (draggedCards.length > 0) {
      const targetZone = getTargetZone(upE.clientX, upE.clientY);
      if (targetZone) {
        const targetContainer = document.getElementById(targetZone);
        draggedCards.forEach(c => {
          c.classList.remove('dragging');
          c.style.position = '';
          c.style.left = '';
          c.style.top = '';
          c.style.zIndex = '';
          targetContainer.appendChild(c);
          c.setAttribute('data-zone', targetZone);
          const color = getZoneColor(targetZone);
          c.style.cssText = `background:${color}; border-color:${color}; color:#fff; display: flex; align-items: center; justify-content: space-between;`;
          c.classList.remove('dragging-ghost');
        });
        updateCounts();
      } else {
        draggedCards.forEach(c => {
          c.classList.remove('dragging', 'dragging-ghost');
          c.style.position = '';
          c.style.left = '';
          c.style.top = '';
          c.style.zIndex = '';
          const originalParent = originalParents.get(c);
          if (originalParent) {
            originalParent.appendChild(c);
          }
        });
      }
    }
  };
  
  document.addEventListener('mousemove', moveListener);
  document.addEventListener('mouseup', upListener);
}

function getTargetZone(x, y) {
  const allZones = [...draggableLists, ...dropZones];
  for (let zone of allZones) {
    const el = document.getElementById(zone.id);
    if (!el) continue;
    const rect = el.getBoundingClientRect();
    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
      return zone.id;
    }
  }
  return null;
}

function renderCanvas() {
  // Render pool list
  const poolList = draggableLists.find(l => l.id === 'pool');
  const poolContainer = document.getElementById('pool');
  poolContainer.innerHTML = '';
  
  if (poolList && poolList.items) {
    poolList.items.forEach(item => {
      const card = createCard(item, 'pool');
      poolContainer.appendChild(card);
    });
  }
  
  // Update pool count
  const poolCountEl = document.getElementById('pool-count');
  if (poolCountEl && poolList) {
    poolCountEl.textContent = poolList.items.length;
  }
  
  // Render drop zones
  const zonesContainer = document.getElementById('zones-container');
  zonesContainer.innerHTML = '';
  
  dropZones.forEach(zone => {
    if (!zone.visible) return;
    
    const wrapper = document.createElement('div');
    wrapper.className = 'zone-wrapper';
    wrapper.id = `zone-wrapper-${zone.id}`;
    
    const header = document.createElement('div');
    header.className = 'zone-header';
    header.style.color = zone.color;
    header.innerHTML = `
      <div class="zone-dot" style="background:${zone.color};"></div>
      <span>${zone.name}</span>
      <span id="count-${zone.id}" class="zone-count" style="background:${zone.color}20;color:${zone.color};">0</span>
      <div class="zone-header-actions">
        <button class="zone-header-btn" title="Toggle visibility" data-zone="${zone.id}" data-action="toggle">👁️</button>
      </div>
    `;
    
    const container = document.createElement('div');
    container.className = 'zone-container';
    container.id = zone.id;
    container.style.borderColor = zone.color + '40';
    container.style.background = zone.color + '08';
    container.setAttribute('data-zone-id', zone.id);
    
    wrapper.appendChild(header);
    wrapper.appendChild(container);
    zonesContainer.appendChild(wrapper);
    
    // Add event listeners to toggle buttons
    header.querySelector('[data-action="toggle"]').addEventListener('click', () => toggleZoneVisibility(zone.id));
    
    // Attach mousedown listener untuk selection box
    attachZoneMouseDownListener(container);
  });
  
  updateCounts();
  renderConfig();
}



function attachZoneMouseDownListener(zoneElement) {
  if (!zoneElement) return;
  
  zoneElement.addEventListener('mousedown', (e) => {
    // Skip if clicking on cards, buttons, or inputs
    if (e.target.closest('.name-card')) return;
    if (e.target.closest('button')) return;
    if (e.target.tagName === 'INPUT') return;
    
    // Only left mouse button
    if (e.button !== 0) return;
    
    e.preventDefault();
    e.stopPropagation();
    
    const startX = e.clientX;
    const startY = e.clientY;
    let isSelecting = false;
    let selectionBox = null;
    
    // Clear previous selection
    selectedCards.forEach(c => c.classList.remove('selected'));
    selectedCards.clear();
    
    const moveListener = (moveE) => {
      const dx = Math.abs(moveE.clientX - startX);
      const dy = Math.abs(moveE.clientY - startY);
      
      // Start selection after moving 5px
      if (!isSelecting && (dx > 5 || dy > 5)) {
        isSelecting = true;
      }
      
      if (isSelecting) {
        moveE.preventDefault();
        moveE.stopPropagation();
        
        const x1 = Math.min(startX, moveE.clientX);
        const y1 = Math.min(startY, moveE.clientY);
        const x2 = Math.max(startX, moveE.clientX);
        const y2 = Math.max(startY, moveE.clientY);
        
        if (!selectionBox) {
          selectionBox = document.createElement('div');
          selectionBox.className = 'selection-box';
          document.body.appendChild(selectionBox);
        }
        
        selectionBox.style.left = x1 + 'px';
        selectionBox.style.top = y1 + 'px';
        selectionBox.style.width = (x2 - x1) + 'px';
        selectionBox.style.height = (y2 - y1) + 'px';
        
        // Select cards in rectangle
        const allCards = zoneElement.querySelectorAll('.name-card');
        allCards.forEach(card => {
          const rect = card.getBoundingClientRect();
          const cardLeft = rect.left;
          const cardRight = rect.right;
          const cardTop = rect.top;
          const cardBottom = rect.bottom;
          
          // Check if card intersects with selection box
          const isInside = (cardRight > x1 && cardLeft < x2 && cardBottom > y1 && cardTop < y2);
          
          if (isInside) {
            if (!selectedCards.has(card)) {
              selectedCards.add(card);
              card.classList.add('selected');
            }
          } else {
            if (selectedCards.has(card)) {
              selectedCards.delete(card);
              card.classList.remove('selected');
            }
          }
        });
      }
    };
    
    const upListener = (upE) => {
      document.removeEventListener('mousemove', moveListener);
      document.removeEventListener('mouseup', upListener);
      if (selectionBox) {
        selectionBox.remove();
      }
    };
    
    document.addEventListener('mousemove', moveListener);
    document.addEventListener('mouseup', upListener);
  }, false);
}

function renderConfig() {
  // Render drop zones config only
  const zonesConfig = document.getElementById('zones-config');
  zonesConfig.innerHTML = '';
  
  dropZones.forEach(zone => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.innerHTML = `
      <div style="flex:1;">
        <input type="text" class="config-input" value="${zone.name}" style="margin-bottom:4px;" onchange="updateZoneName('${zone.id}', this.value)">
        <div class="color-palette">
          ${Object.entries(colorOptions).map(([name, hex]) => `
            <button class="color-btn ${zone.color === hex ? 'active' : ''}" 
              style="background:${hex};" 
              onclick="updateZoneColor('${zone.id}', '${hex}')"
              title="${name}"></button>
          `).join('')}
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeZone('${zone.id}')" style="margin-left:8px;">✕</button>
    `;
    zonesConfig.appendChild(item);
  });
}

function addNewList() {
  const newId = 'list_' + Date.now();
  draggableLists.push({
    id: newId,
    name: 'New List',
    color: '#ca8a04',
    visible: true,
    items: []
  });
  renderCanvas();
}

function addNewZone() {
  const newId = 'zone_' + Date.now();
  dropZones.push({
    id: newId,
    name: 'New Zone',
    color: '#ea580c',
    visible: true
  });
  renderCanvas();
}

function removeList(id) {
  if (id === 'pool') return; // Can't remove pool
  draggableLists = draggableLists.filter(l => l.id !== id);
  renderCanvas();
}

function removeZone(id) {
  dropZones = dropZones.filter(z => z.id !== id);
  renderCanvas();
}

function updateListName(id, name) {
  const list = draggableLists.find(l => l.id === id);
  if (list) {
    list.name = name;
    if (id === 'pool') {
      document.getElementById('pool-name').textContent = name;
    }
    renderConfig();
  }
}

function updateListColor(id, color) {
  const list = draggableLists.find(l => l.id === id);
  if (list) {
    list.color = color;
    renderCanvas();
  }
}

function updateZoneName(id, name) {
  const zone = dropZones.find(z => z.id === id);
  if (zone) {
    zone.name = name;
    renderCanvas();
  }
}

function updateZoneColor(id, color) {
  const zone = dropZones.find(z => z.id === id);
  if (zone) {
    zone.color = color;
    renderCanvas();
  }
}

function toggleZoneVisibility(id) {
  if (id === 'pool') {
    const pool = draggableLists.find(l => l.id === 'pool');
    if (pool) pool.visible = !pool.visible;
  } else {
    const zone = dropZones.find(z => z.id === id);
    if (zone) zone.visible = !zone.visible;
  }
  renderCanvas();
}

function addNameToPool() {
  const input = document.getElementById('new-name-input');
  const name = input.value.trim();
  
  if (!name) {
    alert('Nama tidak boleh kosong');
    return;
  }
  
  const pool = draggableLists.find(l => l.id === 'pool');
  if (pool) {
    pool.items.push(name);
    input.value = '';
    renderCanvas();
    input.focus();
  }
}

function updateCounts() {
  draggableLists.forEach(list => {
    const container = document.getElementById(list.id);
    if (container) {
      const count = container.children.length;
      const countEl = document.getElementById(`count-${list.id}`) || document.getElementById(`${list.id}-count`);
      if (countEl) countEl.textContent = count;
    }
  });
  
  dropZones.forEach(zone => {
    const container = document.getElementById(zone.id);
    if (container) {
      const count = container.children.length;
      const countEl = document.getElementById(`count-${zone.id}`);
      if (countEl) countEl.textContent = count;
    }
  });
}
